<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Office Space</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%231a1828'/><text y='24' x='3' font-size='24'>🖥</text></svg>">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1828; display: flex; flex-direction: column; align-items: center; padding: 12px; font-family: 'Segoe UI', system-ui, sans-serif; }
  canvas { display: block; border: 2px solid #3a3060; border-radius: 4px; box-shadow: 0 8px 48px rgba(0,0,0,0.9); }
  #api-bar { width: 100%; display: flex; gap: 8px; margin-top: 8px; align-items: center; }
  #api-bar label { font-size: 10px; color: #5a4878; font-family: 'Courier New', monospace; white-space: nowrap; letter-spacing: 1px; }
  #api-key { flex: 1; background: #12101e; color: #9080c0; border: 1px solid #2a2040; border-radius: 3px; padding: 5px 10px; font-size: 12px; font-family: 'Courier New', monospace; outline: none; }
  #api-key:focus { border-color: #5040a0; }
  #api-key::placeholder { color: #2a2040; }
  #api-save { background: #1e1830; color: #6050a0; border: 1px solid #2a2040; border-radius: 3px; padding: 5px 12px; font-size: 11px; cursor: pointer; font-family: 'Courier New', monospace; }
  #api-save:hover { background: #2a2040; color: #9080c0; }
  #prompt-bar { display: none; }
  #status { font-size: 10px; color: #3a3060; margin-top: 4px; font-family: 'Courier New', monospace; letter-spacing: 1px; align-self: flex-start; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="api-bar">
  <label>ANTHROPIC KEY</label>
  <input id="api-key" type="password" placeholder="sk-ant-..." autocomplete="off" spellcheck="false">
  <button id="api-save">SAVE</button>
</div>
<div id="prompt-bar">
  <input id="prompt-input" type="text" placeholder="Give Claude a task..." autocomplete="off" spellcheck="false">
  <button id="prompt-send">DEPLOY</button>
</div>
<div id="status">connecting...</div>
<script>
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const statusEl    = document.getElementById('status');
const promptInput = document.getElementById('prompt-input');
const promptSend  = document.getElementById('prompt-send');
const apiKeyInput = document.getElementById('api-key');
const apiSaveBtn  = document.getElementById('api-save');

const savedKey = localStorage.getItem('anthropic_api_key') || '';
function setKeyHidden(h) { document.getElementById('api-bar').style.display = h ? 'none' : 'flex'; if (!h) apiKeyInput.focus(); }
if (savedKey) { apiKeyInput.value = savedKey; setKeyHidden(true); }
apiSaveBtn.addEventListener('click', () => {
  const k = apiKeyInput.value.trim();
  if (k) { localStorage.setItem('anthropic_api_key', k); statusEl.textContent = 'API key saved'; setKeyHidden(true); }
  else   { localStorage.removeItem('anthropic_api_key'); statusEl.textContent = 'API key cleared'; }
});
apiKeyInput.addEventListener('keydown', e => { if (e.key === 'Enter') apiSaveBtn.click(); });
statusEl.style.cursor = 'pointer'; statusEl.title = 'Click to change API key';
statusEl.addEventListener('click', () => setKeyHidden(false));

const W = 900, H = 560;
const DPR = window.devicePixelRatio || 1;
canvas.width = W*DPR; canvas.height = H*DPR;
ctx.scale(DPR, DPR);

function resizeCanvas() {
  const pad = 24;
  const minW = Math.round(1920 * 0.40);
  const maxW = Math.round(1920 * 0.80);
  const dw = Math.max(minW, Math.min(maxW, window.innerWidth - pad));
  const dh = Math.round(dw * H / W);
  canvas.style.width  = dw + 'px';
  canvas.style.height = dh + 'px';
  const bar = document.getElementById('api-bar');
  if (bar) bar.style.maxWidth = dw + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ─── PALETTE ──────────────────────────────────────────────────────────────────
const CARPET     = '#1a1630';
const TILE       = '#16161e';
const PARTITION  = '#38346a';
const DESK_TOP   = '#4a3c2a';
const DESK_FACE  = '#342a1c';
const DESK_LEG   = '#221a10';
const CHAIR_C    = '#4a3e88';
const CHAIR_SEAT = '#6050a8';
const COUCH_BACK = '#3a2c68';
const COUCH_SEAT = '#5448a0';
const COUCH_ARM  = '#2e2258';
const TV_FRAME   = '#0e0c18';
const TV_SCR     = '#050710';
const TBL_TOP    = '#403422';
const TBL_FACE   = '#2a2014';
const POT_C      = '#8c3e18';
const LEAF_G     = '#3a6e2a';
const LEAF_DK    = '#224018';
const OUTLINE    = '#2e2c50';
const SKIN       = '#f0c888';

const ACTION_COLORS = {
  thinking:'#9966ff', reading:'#ffaa22', typing:'#22dd88',
  terminal:'#22ee44', browsing:'#3388ff', responding:'#cc66ff',
  receiving:'#22eecc', spawning:'#ff7722', searching:'#ffee22',
  tool:'#88ee22', idle:'#554466',
};
const ACTION_LABELS = {
  thinking:'THINKING', reading:'READING', typing:'WRITING',
  terminal:'TERMINAL', browsing:'BROWSING', responding:'SPEAKING',
  receiving:'RECEIVING', spawning:'SPAWNING', searching:'LOADING',
  tool:'TOOL', idle:'IDLE',
};
const AGENT_COLORS = ['#e83878','#28c87a','#2888e8','#e8b828','#9838e8','#e83828','#28c8d8','#e87828'];
const HAIR_COLS   = ['#1a1018','#2a1a08','#3a2010','#18100c','#382808','#160e0c'];

// ─── LAYOUT ───────────────────────────────────────────────────────────────────
const LOUNGE_W  = 220;
const DESK_SLOTS = 8;

// 8 individual desks + 2 group tables (collab tables)
const BUILDING_SLOTS = [
  { x: 308, y: 148 }, { x: 443, y: 148 }, { x: 578, y: 148 }, { x: 713, y: 148 },
  { x: 308, y: 295 }, { x: 443, y: 295 }, { x: 578, y: 295 }, { x: 713, y: 295 },
  { x: 385, y: 448 }, { x: 660, y: 448 },
];

const LOUNGE_GATE = { x: LOUNGE_W, y: 280 };

function workPos(agent) {
  const idx = agent.slotIdx;
  const s = BUILDING_SLOTS[idx];
  if (idx >= DESK_SLOTS) {
    const xOff = [-60, -20, 20, 60];
    const others = [...agents.values()].filter(a => a.slotIdx === idx);
    const posIdx = others.filter(a => a.colorIdx < agent.colorIdx).length;
    return { x: s.x + (xOff[posIdx % 4] || 0), y: s.y + 34 };
  }
  return { x: s.x, y: s.y + 32 };
}

// ─── AGENTS ───────────────────────────────────────────────────────────────────
const agents = new Map();
let colorIdx = 0;
const recentSpawners = new Map();
const IDLE_TIMEOUT = 50000;

function isSlotTaken(idx) {
  if (idx >= DESK_SLOTS) {
    let n = 0; for (const a of agents.values()) if (a.slotIdx === idx) n++;
    return n >= 4;
  }
  for (const a of agents.values()) if (a.slotIdx === idx) return true;
  return false;
}

function assignSlot(sessionId, projectDir) {
  const ex = agents.get(sessionId);
  if (ex?.slotIdx != null) return ex.slotIdx;
  const spawner = recentSpawners.get(projectDir);
  if (spawner && Date.now() - spawner.time < 90000 && spawner.sessionId !== sessionId) {
    for (let i = DESK_SLOTS; i < BUILDING_SLOTS.length; i++)
      if (!isSlotTaken(i)) return i;
  }
  for (let i = 0; i < DESK_SLOTS; i++)
    if (!isSlotTaken(i)) return i;
  return DESK_SLOTS;
}

function getOrCreate(sessionId, projectDir) {
  if (!agents.has(sessionId)) {
    const ci = colorIdx % AGENT_COLORS.length;
    agents.set(sessionId, {
      id: sessionId, name: projectDir,
      color: AGENT_COLORS[ci], colorIdx: colorIdx++,
      pos: { x: LOUNGE_GATE.x, y: LOUNGE_GATE.y },
      slotIdx: null, waypoints: [],
      phase: 'idle', action: 'idle',
      bubbleText: '', bubbleLife: 0,
      lastEvent: Date.now(),
      facing: 'right', walkTick: 0, buildProgress: 0,
    });
  }
  return agents.get(sessionId);
}

function planPathToWork(agent) {
  const dst = workPos(agent);
  const viaX = LOUNGE_W + 18 + (agent.colorIdx % 4) * 8;
  agent.waypoints = [{ x: viaX, y: dst.y }, dst];
}

function planPathToLounge(agent) {
  const lx = 105 + (agent.colorIdx % 5) * 18 - 36;
  const ly = 248 + (agent.colorIdx % 4) * 14 - 21;
  agent.waypoints = [
    { x: LOUNGE_W + 10, y: agent.pos.y },
    { x: LOUNGE_W - 8,  y: ly },
    { x: lx, y: ly },
  ];
}

// ─── DRAWING PRIMITIVES ───────────────────────────────────────────────────────
function rr(x, y, w, h, r) {
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}
function gBox(x,y,w,h,fill,r=3,sw=1.5) {
  ctx.fillStyle=fill; rr(x,y,w,h,r); ctx.fill();
  ctx.strokeStyle=OUTLINE; ctx.lineWidth=sw; rr(x,y,w,h,r); ctx.stroke();
}
function hexRgba(hex,a) {
  const n=parseInt(hex.slice(1),16);
  return `rgba(${n>>16},${(n>>8)&255},${n&255},${a})`;
}

// ─── PLANT ────────────────────────────────────────────────────────────────────
function drawPlant(cx, cy) {
  ctx.fillStyle = POT_C;
  rr(cx-7, cy-4, 14, 12, 2); ctx.fill();
  ctx.strokeStyle=OUTLINE; ctx.lineWidth=1; rr(cx-7, cy-4, 14, 12, 2); ctx.stroke();
  ctx.fillStyle = '#904820'; ctx.fillRect(cx-8, cy-2, 16, 2);
  const leaves = [[0,-10],[-7,-14],[7,-14],[-3,-18],[4,-19],[0,-22]];
  for (const [ox,oy] of leaves) {
    ctx.fillStyle = LEAF_G;
    ctx.beginPath(); ctx.ellipse(cx+ox, cy+oy, 6, 4, ox*0.08, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle=LEAF_DK; ctx.lineWidth=0.8; ctx.stroke();
  }
}

// ─── BACKGROUND ───────────────────────────────────────────────────────────────
function drawBackground() {
  // Lounge carpet
  ctx.fillStyle = CARPET;
  ctx.fillRect(0, 0, LOUNGE_W, H);
  ctx.strokeStyle = 'rgba(150,120,220,0.08)'; ctx.lineWidth = 1;
  for (let x=0; x<LOUNGE_W; x+=10) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y=0; y<H; y+=10) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(LOUNGE_W,y); ctx.stroke(); }

  // Office tile floor
  ctx.fillStyle = TILE;
  ctx.fillRect(LOUNGE_W, 0, W-LOUNGE_W, H);
  ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 1;
  for (let x=LOUNGE_W; x<W; x+=50) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y=0; y<H; y+=50) { ctx.beginPath(); ctx.moveTo(LOUNGE_W,y); ctx.lineTo(W,y); ctx.stroke(); }

  // Glass partition with door opening at y=250–320
  const DOOR_Y=250, DOOR_H=70;
  // Glass panels (above and below door)
  [[0, DOOR_Y], [DOOR_Y+DOOR_H, H-(DOOR_Y+DOOR_H)]].forEach(([y, h]) => {
    ctx.fillStyle = 'rgba(100,80,200,0.22)';
    ctx.fillRect(LOUNGE_W, y, 8, h);
    ctx.fillStyle = 'rgba(160,140,255,0.35)';
    ctx.fillRect(LOUNGE_W+2, y, 2, h);
    ctx.fillStyle = PARTITION;
    ctx.fillRect(LOUNGE_W-2, y, 3, h);
    ctx.fillRect(LOUNGE_W+8, y, 3, h);
  });
  // Door frame posts
  ctx.fillStyle = PARTITION;
  ctx.fillRect(LOUNGE_W-2, DOOR_Y-4, 3, 8);
  ctx.fillRect(LOUNGE_W+8, DOOR_Y-4, 3, 8);
  ctx.fillRect(LOUNGE_W-2, DOOR_Y+DOOR_H-4, 3, 8);
  ctx.fillRect(LOUNGE_W+8, DOOR_Y+DOOR_H-4, 3, 8);

  // TV on lounge wall — wide, same width as sofa
  const TVX=42, TVY=34, TVW=148, TVH=30;
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.fillRect(TVX+3, TVY+3, TVW+4, TVH+4);
  ctx.fillStyle = TV_FRAME;
  rr(TVX, TVY, TVW+4, TVH+4, 3); ctx.fill();
  ctx.fillStyle = TV_SCR;
  ctx.fillRect(TVX+4, TVY+4, TVW, TVH);
  // Screen glow
  ctx.fillStyle = 'rgba(40,80,210,0.15)';
  ctx.fillRect(TVX+4, TVY+4, TVW, TVH);
  // Horizontal scanlines
  ctx.strokeStyle = 'rgba(80,120,255,0.2)'; ctx.lineWidth=1;
  for (let ly=TVY+10; ly<TVY+TVH; ly+=8) {
    ctx.beginPath(); ctx.moveTo(TVX+6, ly); ctx.lineTo(TVX+TVW-2, ly); ctx.stroke();
  }
  ctx.fillStyle = 'rgba(120,160,255,0.7)';
  ctx.font = 'bold 9px "Courier New"'; ctx.textAlign='center';
  ctx.fillText('CLAUDE CODE', TVX+TVW/2+2, TVY+21);
  // TV stand
  ctx.fillStyle = '#1a1828';
  ctx.fillRect(TVX+TVW/2-4, TVY+TVH+4, 8, 8);
  ctx.fillRect(TVX+TVW/2-16, TVY+TVH+11, 32, 4);

  // Plants
  drawPlant(LOUNGE_W+18, 52);
  drawPlant(LOUNGE_W+18, H-42);
  drawPlant(8, 38);
  drawPlant(8, H-38);

  // Section label
  ctx.fillStyle = 'rgba(140,120,200,0.5)';
  ctx.font = '9px "Segoe UI"'; ctx.textAlign='center';
  ctx.fillText('LOUNGE', LOUNGE_W/2, H-14);
  ctx.fillText('OFFICE', (LOUNGE_W+W)/2, H-14);
}

// ─── COUCH + COFFEE TABLE ─────────────────────────────────────────────────────
function drawCouch() {
  const CX=118, CY=270;
  // Rug
  ctx.fillStyle='rgba(80,55,140,0.1)';
  rr(CX-82, CY-32, 164, 100, 10); ctx.fill();
  ctx.strokeStyle='rgba(80,55,140,0.18)'; ctx.lineWidth=1;
  rr(CX-82, CY-32, 164, 100, 10); ctx.stroke();
  rr(CX-74, CY-24, 148, 84, 7); ctx.stroke();

  // Couch shadow
  ctx.fillStyle='rgba(0,0,0,0.14)';
  ctx.beginPath(); ctx.ellipse(CX, CY+28, 72, 10, 0, 0, Math.PI*2); ctx.fill();

  // Armrests
  ctx.fillStyle = COUCH_ARM;
  rr(CX-74, CY-16, 14, 46, 4); ctx.fill();
  ctx.strokeStyle=OUTLINE; ctx.lineWidth=1; rr(CX-74, CY-16, 14, 46, 4); ctx.stroke();
  rr(CX+60, CY-16, 14, 46, 4); ctx.fill();
  rr(CX+60, CY-16, 14, 46, 4); ctx.stroke();

  // Back cushions
  ctx.fillStyle = COUCH_BACK;
  rr(CX-60, CY-16, 120, 22, 5); ctx.fill();
  ctx.strokeStyle=OUTLINE; ctx.lineWidth=1.2; rr(CX-60, CY-16, 120, 22, 5); ctx.stroke();
  // Cushion seams
  ctx.strokeStyle='rgba(255,255,255,0.07)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(CX-20,CY-16); ctx.lineTo(CX-20,CY+6); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(CX+20,CY-16); ctx.lineTo(CX+20,CY+6); ctx.stroke();

  // Seat
  ctx.fillStyle = COUCH_SEAT;
  rr(CX-60, CY+6, 120, 26, 4); ctx.fill();
  ctx.strokeStyle=OUTLINE; ctx.lineWidth=1.2; rr(CX-60, CY+6, 120, 26, 4); ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(CX-20,CY+6); ctx.lineTo(CX-20,CY+32); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(CX+20,CY+6); ctx.lineTo(CX+20,CY+32); ctx.stroke();

  // Coffee table
  const TX=CX, TY=CY+48;
  ctx.fillStyle='rgba(0,0,0,0.1)';
  ctx.beginPath(); ctx.ellipse(TX, TY+10, 50, 8, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='#1e1a12';
  rr(TX-46, TY-2, 92, 24, 5); ctx.fill();
  ctx.strokeStyle=OUTLINE; ctx.lineWidth=1.2; rr(TX-46, TY-2, 92, 24, 5); ctx.stroke();
  // Items on table
  ctx.fillStyle='#2a2830'; rr(TX-20,TY+3,12,9,2); ctx.fill(); // mug
  ctx.strokeStyle=OUTLINE; ctx.lineWidth=0.7; rr(TX-20,TY+3,12,9,2); ctx.stroke();
  ctx.fillStyle='rgba(80,200,255,0.4)'; ctx.fillRect(TX-19,TY+4,10,5);
  ctx.fillStyle='#1a1828'; rr(TX+4,TY+2,22,14,2); ctx.fill(); // laptop
  ctx.fillStyle='rgba(40,80,200,0.4)'; rr(TX+5,TY+3,20,12,1); ctx.fill();
}

// ─── DESK ─────────────────────────────────────────────────────────────────────
function drawDesk(slotIdx, agentsHere) {
  const s = BUILDING_SLOTS[slotIdx];
  const cx=s.x, cy=s.y;
  const DW=54, DH=36;
  const agent = agentsHere[0];
  const aCol = agent ? (ACTION_COLORS[agent.action]||ACTION_COLORS.idle) : ACTION_COLORS.idle;
  const active = agent && agent.action !== 'idle' && agent.phase === 'working';

  // Desk + chair shadow
  ctx.fillStyle = 'rgba(0,0,0,0.38)';
  ctx.beginPath(); ctx.ellipse(cx+2, cy+DH/2+20, DW/2+8, 9, 0, 0, Math.PI*2); ctx.fill();

  // Chair shadow
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.beginPath(); ctx.ellipse(cx, cy+DH/2+18, 11, 4, 0, 0, Math.PI*2); ctx.fill();

  // Chair legs (4 small pegs)
  ctx.fillStyle = '#1a1828';
  [[-9,12],[9,12],[-9,20],[9,20]].forEach(([ox,oy]) => {
    ctx.fillRect(cx+ox-1, cy+DH/2+oy, 2, 5);
  });

  // Chair back
  ctx.fillStyle = active ? CHAIR_C : hexRgba(CHAIR_C, 0.7);
  rr(cx-11, cy+DH/2+5, 22, 15, 4); ctx.fill();
  ctx.strokeStyle=OUTLINE; ctx.lineWidth=active?1.2:0.8; rr(cx-11, cy+DH/2+5, 22, 15, 4); ctx.stroke();

  // Chair seat (top strip, lighter)
  ctx.fillStyle = active ? CHAIR_SEAT : hexRgba(CHAIR_SEAT, 0.7);
  rr(cx-10, cy+DH/2+1, 20, 7, 2); ctx.fill();
  ctx.strokeStyle=OUTLINE; ctx.lineWidth=0.8; rr(cx-10, cy+DH/2+1, 20, 7, 2); ctx.stroke();

  // Desk legs (two front legs, visible below face)
  const legW=5, legH=11;
  ctx.fillStyle = DESK_LEG;
  ctx.fillRect(cx-DW/2+3,  cy+DH/2-1, legW, legH);
  ctx.fillRect(cx+DW/2-8,  cy+DH/2-1, legW, legH);
  ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=0.5;
  ctx.strokeRect(cx-DW/2+3,  cy+DH/2-1, legW, legH);
  ctx.strokeRect(cx+DW/2-8,  cy+DH/2-1, legW, legH);

  // Desk face (front panel, darker wood)
  ctx.fillStyle = DESK_FACE;
  rr(cx-DW/2, cy+DH/2-6, DW, 9, 1); ctx.fill();
  ctx.strokeStyle=OUTLINE; ctx.lineWidth=1; rr(cx-DW/2, cy+DH/2-6, DW, 9, 1); ctx.stroke();

  // Desk top
  ctx.fillStyle = DESK_TOP;
  rr(cx-DW/2, cy-DH/2, DW, DH, 2); ctx.fill();
  ctx.strokeStyle=OUTLINE; ctx.lineWidth=1.2; rr(cx-DW/2, cy-DH/2, DW, DH, 2); ctx.stroke();
  // Subtle wood grain
  ctx.strokeStyle='rgba(0,0,0,0.12)'; ctx.lineWidth=1;
  for (let gx=cx-DW/2+9; gx<cx+DW/2-4; gx+=10) {
    ctx.beginPath(); ctx.moveTo(gx, cy-DH/2+2); ctx.lineTo(gx+3, cy+DH/2-2); ctx.stroke();
  }

  // Monitor
  const mw=20, mh=14;
  ctx.fillStyle='#1e1c2e';
  rr(cx-mw/2, cy-DH/2+2, mw, mh, 2); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=0.8; rr(cx-mw/2, cy-DH/2+2, mw, mh, 2); ctx.stroke();
  ctx.fillStyle = active ? hexRgba(aCol,0.85) : TV_SCR;
  rr(cx-mw/2+1.5, cy-DH/2+3, mw-3, mh-3, 1); ctx.fill();
  if (active) {
    ctx.fillStyle = hexRgba(aCol, 0.11+Math.sin(tick*0.06)*0.05);
    ctx.beginPath(); ctx.ellipse(cx, cy-DH/2+9, 26, 20, 0, 0, Math.PI*2); ctx.fill();
  }
  ctx.fillStyle='#2a2840';
  ctx.fillRect(cx-2, cy-DH/2+mh+2, 4, 4);
  ctx.fillRect(cx-5, cy-DH/2+mh+5, 10, 2);

  // Keyboard
  ctx.fillStyle='#252338';
  rr(cx-12, cy+3, 24, 8, 1); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=0.5; rr(cx-12, cy+3, 24, 8, 1); ctx.stroke();

}

// ─── GROUP TABLE ──────────────────────────────────────────────────────────────
function drawGroupTable(slotIdx, agentsHere) {
  const s = BUILDING_SLOTS[slotIdx];
  const cx=s.x, cy=s.y;
  const TW=168, TH=58;
  const chairXs = [cx-57, cx-19, cx+19, cx+57];

  // Large shadow under whole assembly
  ctx.fillStyle='rgba(0,0,0,0.4)';
  ctx.beginPath(); ctx.ellipse(cx+3, cy+TH/2+18, TW/2+12, 12, 0, 0, Math.PI*2); ctx.fill();

  // Chair shadows (bottom row)
  ctx.fillStyle='rgba(0,0,0,0.2)';
  for (const lx of chairXs) {
    ctx.beginPath(); ctx.ellipse(lx, cy+TH/2+20, 10, 4, 0, 0, Math.PI*2); ctx.fill();
  }

  // Chairs top row (empty, faint)
  for (let i=0; i<3; i++) {
    const tx = cx-44+i*44;
    ctx.fillStyle = hexRgba(CHAIR_C, 0.4);
    rr(tx-10, cy-TH/2-14, 20, 14, 3); ctx.fill();
    ctx.strokeStyle=OUTLINE; ctx.lineWidth=0.6; rr(tx-10, cy-TH/2-14, 20, 14, 3); ctx.stroke();
    // Chair legs top row
    ctx.fillStyle = '#1a1828';
    [[-8,13],[8,13]].forEach(([ox,oy]) => ctx.fillRect(tx+ox-1, cy-TH/2-14+oy, 2, 5));
  }

  // Chairs bottom row with legs
  for (let i=0; i<4; i++) {
    const lx = chairXs[i];
    const occ = i < agentsHere.length;
    // Chair legs
    ctx.fillStyle = '#1a1828';
    [[-8,13],[8,13]].forEach(([ox,oy]) => ctx.fillRect(lx+ox-1, cy+TH/2+4+oy, 2, 5));
    // Chair back
    ctx.fillStyle = occ ? CHAIR_C : hexRgba(CHAIR_C, 0.5);
    rr(lx-10, cy+TH/2+4, 20, 14, 3); ctx.fill();
    ctx.strokeStyle=OUTLINE; ctx.lineWidth=occ?1.1:0.6; rr(lx-10, cy+TH/2+4, 20, 14, 3); ctx.stroke();
    // Chair seat highlight
    ctx.fillStyle = occ ? CHAIR_SEAT : hexRgba(CHAIR_SEAT, 0.45);
    rr(lx-9, cy+TH/2+4, 18, 6, 2); ctx.fill();
  }

  // Table legs (4 visible below front edge)
  const tlegH=13, tlegW=6;
  ctx.fillStyle = TBL_FACE;
  [[cx-TW/2+5], [cx-TW/2+55], [cx+TW/2-61], [cx+TW/2-11]].forEach(([lx]) => {
    ctx.fillRect(lx, cy+TH/2-2, tlegW, tlegH);
    ctx.strokeStyle='rgba(0,0,0,0.45)'; ctx.lineWidth=0.5;
    ctx.strokeRect(lx, cy+TH/2-2, tlegW, tlegH);
  });

  // Table face (front panel)
  ctx.fillStyle = TBL_FACE;
  rr(cx-TW/2, cy+TH/2-7, TW, 10, 1); ctx.fill();
  ctx.strokeStyle=OUTLINE; ctx.lineWidth=1.1; rr(cx-TW/2, cy+TH/2-7, TW, 10, 1); ctx.stroke();

  // Table top
  ctx.fillStyle = TBL_TOP;
  rr(cx-TW/2, cy-TH/2, TW, TH, 3); ctx.fill();
  ctx.strokeStyle=OUTLINE; ctx.lineWidth=1.5; rr(cx-TW/2, cy-TH/2, TW, TH, 3); ctx.stroke();
  ctx.strokeStyle='rgba(0,0,0,0.12)'; ctx.lineWidth=1;
  for (let gx=cx-TW/2+12; gx<cx+TW/2-6; gx+=15) {
    ctx.beginPath(); ctx.moveTo(gx, cy-TH/2+3); ctx.lineTo(gx+4, cy+TH/2-3); ctx.stroke();
  }

  // Laptops at each seat
  for (let i=0; i<4; i++) {
    const lx = chairXs[i];
    const a = agentsHere[i];
    const aCol = a ? (ACTION_COLORS[a.action]||ACTION_COLORS.idle) : null;
    const on = a && a.action !== 'idle' && a.phase === 'working';
    ctx.fillStyle = a ? '#252338' : hexRgba('#252338', 0.4);
    rr(lx-11, cy+6, 22, 14, 2); ctx.fill();
    ctx.fillStyle = on ? hexRgba(aCol,0.82) : TV_SCR;
    rr(lx-10, cy+7, 20, 12, 1); ctx.fill();
    if (on) {
      ctx.fillStyle = hexRgba(aCol, 0.09+Math.sin(tick*0.05+i)*0.04);
      ctx.beginPath(); ctx.ellipse(lx, cy+12, 24, 18, 0, 0, Math.PI*2); ctx.fill();
    }
  }

  // Water jug in center
  ctx.fillStyle='#1a2430';
  rr(cx-9, cy-10, 18, 22, 3); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=0.8; rr(cx-9, cy-10, 18, 22, 3); ctx.stroke();
  ctx.fillStyle='rgba(40,120,180,0.5)';
  rr(cx-7, cy-8, 14, 17, 2); ctx.fill();

}

// ─── WORKER ───────────────────────────────────────────────────────────────────
function drawWorker(a) {
  const {pos:{x,y}, color, action, walkTick, phase, colorIdx:ci} = a;
  const walking = a.waypoints.length > 0;
  const bob = walking ? 0 : Math.sin(tick*0.045+ci)*0.9;
  const aCol = ACTION_COLORS[action]||ACTION_COLORS.idle;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.16)';
  ctx.beginPath(); ctx.ellipse(x+1,y+7,8,3,0,0,Math.PI*2); ctx.fill();

  // Pants
  const sw = walking ? Math.sin(walkTick*0.38)*5 : 0;
  ctx.fillStyle='#2a2848';
  ctx.fillRect(x-5,y+3+sw,4,7);
  ctx.fillRect(x+1,y+3-sw,4,7);
  ctx.fillStyle='#18162a';
  ctx.fillRect(x-6,y+8+sw,5,3);
  ctx.fillRect(x+1,y+8-sw,5,3);

  // Body / shirt
  ctx.fillStyle=color;
  ctx.beginPath(); ctx.ellipse(x,y+bob,8,10,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=hexRgba(OUTLINE,0.65); ctx.lineWidth=1; ctx.stroke();
  // Collar
  ctx.strokeStyle='rgba(255,255,255,0.14)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(x-2,y-8+bob); ctx.lineTo(x,y-4+bob); ctx.lineTo(x+2,y-8+bob); ctx.stroke();
  // Pocket protector
  ctx.fillStyle='rgba(255,255,255,0.18)';
  ctx.fillRect(x-5,y-3+bob,5,5);
  ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=0.5;
  ctx.strokeRect(x-5,y-3+bob,5,5);
  ctx.fillStyle='#e83878'; ctx.fillRect(x-4,y-5+bob,1,4); // pen 1
  ctx.fillStyle='#2888e8'; ctx.fillRect(x-2,y-5+bob,1,4); // pen 2

  // Head
  ctx.fillStyle=SKIN;
  ctx.beginPath(); ctx.arc(x,y-8+bob,7,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=hexRgba(OUTLINE,0.5); ctx.lineWidth=1; ctx.stroke();
  ctx.fillStyle=HAIR_COLS[ci%6];
  ctx.beginPath(); ctx.arc(x,y-9+bob,7,Math.PI,0); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#1a1828';
  ctx.fillRect(x-3,y-10+bob,2,2);
  ctx.fillRect(x+1,y-10+bob,2,2);
  // Glasses
  ctx.strokeStyle='#2a2440'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.arc(x-2,y-10+bob,2.5,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(x+2,y-10+bob,2.5,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-4.5,y-10+bob); ctx.lineTo(x+4.5,y-10+bob); ctx.stroke(); // bridge
  ctx.beginPath(); ctx.moveTo(x-4.5,y-10+bob); ctx.lineTo(x-7,y-9+bob); ctx.stroke(); // left arm
  ctx.beginPath(); ctx.moveTo(x+4.5,y-10+bob); ctx.lineTo(x+7,y-9+bob); ctx.stroke(); // right arm

  // Action glow
  if (action !== 'idle' && phase === 'working') {
    ctx.fillStyle=hexRgba(aCol,0.06+Math.sin(tick*0.06)*0.03);
    ctx.beginPath(); ctx.ellipse(x,y,18,22,0,0,Math.PI*2); ctx.fill();
  }

  // Raised arm + tool
  if (action !== 'idle' && action !== 'thinking' && phase === 'working') {
    ctx.strokeStyle=SKIN; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(x+6,y-2+bob); ctx.lineTo(x+12,y-11+bob); ctx.stroke();
    ctx.save(); ctx.translate(0, bob); drawOfficeTool(x, y, action, aCol); ctx.restore();
  }

  // Thinking dots
  if (action === 'thinking' && phase === 'working') {
    const ph=(tick*0.07)%(Math.PI*2);
    [0,1,2].forEach(i => {
      ctx.globalAlpha=0.4+Math.sin(ph+i*1.0)*0.35;
      ctx.fillStyle=ACTION_COLORS.thinking;
      ctx.beginPath(); ctx.arc(x-5+i*5,y-22+bob-Math.sin(ph+i)*4,3,0,Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha=1;
  }
}

function drawOfficeTool(x, y, action, aCol) {
  if (action === 'reading') {
    ctx.fillStyle='#2a4488'; rr(x+5,y-18,12,9,1); ctx.fill();
    ctx.fillStyle='rgba(200,220,255,0.8)'; rr(x+6,y-17,10,7,1); ctx.fill();
  } else if (action === 'typing') {
    ctx.fillStyle='#1e1c2e'; rr(x+5,y-20,14,10,1); ctx.fill();
    ctx.fillStyle=hexRgba(aCol,0.75); rr(x+6,y-19,12,8,1); ctx.fill();
  } else if (action === 'terminal') {
    ctx.fillStyle='#0a1018'; rr(x+5,y-20,14,12,1); ctx.fill();
    ctx.fillStyle='#22ee44'; ctx.font='5px "Courier New"'; ctx.textAlign='left'; ctx.fillText('>_',x+7,y-11);
  } else if (action === 'browsing') {
    ctx.fillStyle='#2a2840'; rr(x+8,y-20,9,15,2); ctx.fill();
    ctx.fillStyle=hexRgba(aCol,0.65); rr(x+9,y-18,7,10,1); ctx.fill();
  } else if (action === 'spawning') {
    ctx.strokeStyle='#ccccaa'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(x+6,y-20); ctx.lineTo(x+14,y-8); ctx.stroke();
    ctx.fillStyle='#ffee88'; ctx.beginPath(); ctx.arc(x+6,y-20,3,0,Math.PI*2); ctx.fill();
  } else if (action === 'searching') {
    ctx.strokeStyle='#ffee22'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(x+10,y-15,5,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+14,y-11); ctx.lineTo(x+17,y-8); ctx.stroke();
  } else {
    ctx.fillStyle=aCol; ctx.globalAlpha=0.85;
    ctx.beginPath(); ctx.arc(x+11,y-14,4,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }
}

// ─── OVERLAYS ─────────────────────────────────────────────────────────────────
function drawWorkerLabel(a) {
  if (a.phase === 'idle') return;
  const {pos:{x,y}, name, action} = a;
  const aCol = ACTION_COLORS[action]||ACTION_COLORS.idle;
  const lbl = action !== 'idle' ? (ACTION_LABELS[action]||action.toUpperCase()).slice(0,9) : name.slice(0,10);
  ctx.font='bold 9px "Segoe UI",system-ui';
  const tw=ctx.measureText(lbl).width, bw=tw+10, bh=14;
  ctx.fillStyle='rgba(14,12,28,0.88)'; rr(x-bw/2,y-30,bw,bh,5); ctx.fill();
  ctx.strokeStyle=hexRgba(aCol,0.6); ctx.lineWidth=1; rr(x-bw/2,y-30,bw,bh,5); ctx.stroke();
  ctx.fillStyle=aCol; ctx.textAlign='center'; ctx.fillText(lbl,x,y-19);
}

function drawBubble(a) {
  if (a.bubbleLife <= 0) return;
  const {pos:{x,y}, bubbleText, bubbleLife, color} = a;
  const alpha = Math.min(1,bubbleLife/30);
  const text = bubbleText.length>32 ? bubbleText.slice(0,32)+'…' : bubbleText;
  ctx.font='11px "Segoe UI",system-ui';
  const tw=ctx.measureText(text).width, bw=tw+16, bh=22;
  const bx=Math.max(10,Math.min(W-bw-10,x-bw/2)), by=y-56;
  ctx.save(); ctx.globalAlpha=alpha;
  gBox(bx,by,bw,bh,'#1e1c34',5,1.5);
  ctx.strokeStyle=hexRgba(color,0.6); ctx.lineWidth=1.5; rr(bx,by,bw,bh,5); ctx.stroke();
  const tx=Math.max(bx+8,Math.min(bx+bw-8,x));
  ctx.fillStyle='#1e1c34';
  ctx.beginPath(); ctx.moveTo(tx-4,by+bh); ctx.lineTo(tx+4,by+bh); ctx.lineTo(tx,by+bh+5); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#d8d0f0'; ctx.textAlign='left';
  ctx.beginPath(); rr(bx+1,by+1,bw-2,bh-2,4); ctx.clip(); ctx.fillText(text,bx+8,by+15);
  ctx.restore();
}

function drawTitleBar() {
  ctx.fillStyle='rgba(14,12,28,0.94)'; ctx.fillRect(0,0,W,18);
  ctx.font='10px "Courier New"'; ctx.fillStyle='rgba(160,140,220,0.9)'; ctx.textAlign='left';
  ctx.fillText('[ ] OFFICE SPACE  //  CLAUDE CODE VISUALIZER', 10, 13);
  ctx.fillStyle='rgba(120,100,180,0.7)'; ctx.textAlign='right';
  const working=[...agents.values()].filter(a=>a.phase==='working').length;
  ctx.fillText(`${agents.size} agent${agents.size!==1?'s':''} · ${working} working`, W-10, 13);
}

function drawEmptyState() {
  ctx.textAlign='center';
  ctx.fillStyle='rgba(160,140,220,0.5)'; ctx.font='16px "Segoe UI",system-ui';
  ctx.fillText('No agents in the office', W/2, H/2-10);
  ctx.fillStyle='rgba(120,100,180,0.4)'; ctx.font='12px "Segoe UI",system-ui';
  ctx.fillText('Start Claude Code to see activity', W/2, H/2+14);
}

// ─── SSE ──────────────────────────────────────────────────────────────────────
function connect() {
  const es = new EventSource('/events');
  es.onopen  = () => { statusEl.textContent = 'connected — watching sessions'; };
  es.onerror = () => { statusEl.textContent = 'reconnecting...'; es.close(); setTimeout(connect, 2000); };
  es.onmessage = e => {
    const ev    = JSON.parse(e.data);
    const agent = getOrCreate(ev.sessionId, ev.projectDir);
    if (ev.action === 'spawning')
      recentSpawners.set(ev.projectDir, { sessionId: ev.sessionId, time: Date.now() });
    agent.action    = ev.action;
    agent.lastEvent = Date.now();
    agent.bubbleText = ev.detail;
    agent.bubbleLife = 240;
    if (agent.slotIdx == null)
      agent.slotIdx = assignSlot(ev.sessionId, ev.projectDir);
    const age = ev.timestamp ? Date.now() - new Date(ev.timestamp).getTime() : 0;
    if (agent.phase === 'idle' || agent.phase === 'to_idle') {
      if (age < 30000) {
        agent.phase = 'to_work';
        planPathToWork(agent);
      } else {
        const wp = workPos(agent);
        agent.pos = { x: wp.x, y: wp.y };
        agent.phase = 'working';
      }
    }
  };
}

connect();

async function sendPrompt() {
  const prompt = promptInput.value.trim();
  if (!prompt) return;
  promptSend.disabled = true; promptSend.textContent = '...';
  try {
    const r = await fetch('/prompt', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ prompt, projectDir: '', apiKey: localStorage.getItem('anthropic_api_key')||'' }),
    });
    const data = await r.json();
    if (data.ok) { promptInput.value=''; statusEl.textContent='Task deployed — watching for agent...'; }
    else statusEl.textContent = 'Error: '+(data.error||'unknown');
  } catch(e) { statusEl.textContent = 'Failed: '+e.message; }
  finally { promptSend.disabled=false; promptSend.textContent='DEPLOY'; }
}
promptSend.addEventListener('click', sendPrompt);
promptInput.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendPrompt();} });

// ─── UPDATE ───────────────────────────────────────────────────────────────────
function updateAgents() {
  const now = Date.now();
  for (const a of agents.values()) {
    if (a.slotIdx != null && a.buildProgress < 1)
      a.buildProgress = Math.min(1, a.buildProgress + 0.002);
    if (a.phase === 'working' && now - a.lastEvent > IDLE_TIMEOUT) {
      a.phase = 'to_idle'; a.action = 'idle';
      a.buildProgress = 0;
      planPathToLounge(a);
    }
    if (a.waypoints.length > 0) {
      const t = a.waypoints[0];
      const dx=t.x-a.pos.x, dy=t.y-a.pos.y;
      const d = Math.sqrt(dx*dx+dy*dy);
      if (d < 2) {
        a.pos.x=t.x; a.pos.y=t.y; a.waypoints.shift();
        if (!a.waypoints.length) {
          if (a.phase==='to_work') a.phase='working';
          if (a.phase==='to_idle') a.phase='idle';
        }
      } else {
        const sp = Math.min(1.7, d);
        a.pos.x+=dx/d*sp; a.pos.y+=dy/d*sp;
        a.facing = dx>0?'right':'left';
        a.walkTick++;
      }
    }
    if (a.bubbleLife > 0) a.bubbleLife--;
  }
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
let tick = 0;
function render() {
  ctx.clearRect(0,0,W,H);
  drawBackground();

  const drawables = [];

  // Couch + coffee table (drawn before idle workers so workers appear on top)
  drawables.push({ sortY: 244, draw: drawCouch });

  // Desks & group tables
  const slotMap = new Map();
  for (const a of agents.values()) {
    if (a.slotIdx != null) {
      if (!slotMap.has(a.slotIdx)) slotMap.set(a.slotIdx, []);
      slotMap.get(a.slotIdx).push(a);
    }
  }
  for (let i=0; i<BUILDING_SLOTS.length; i++) {
    const agHere = slotMap.get(i) || [];
    const s = BUILDING_SLOTS[i];
    const sortY = i < DESK_SLOTS ? s.y + 20 : s.y + 22;
    const ii = i; // capture for closure
    drawables.push({ sortY, draw: () => (ii < DESK_SLOTS ? drawDesk : drawGroupTable)(ii, agHere) });
  }

  // Workers
  for (const a of agents.values())
    drawables.push({ sortY: a.pos.y + 8, draw: () => drawWorker(a) });

  drawables.sort((a,b) => a.sortY - b.sortY);
  for (const d of drawables) d.draw();

  for (const a of agents.values()) { drawWorkerLabel(a); drawBubble(a); }
  if (agents.size === 0) drawEmptyState();
  drawTitleBar();

  updateAgents();
  tick++;
  requestAnimationFrame(render);
}
render();
</script>
