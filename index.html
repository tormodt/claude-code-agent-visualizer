<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Office Tower</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%2318181e'/><text y='24' x='3' font-size='24'>🏢</text></svg>">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #080a0e; display: flex; flex-direction: column; align-items: center; padding: 12px; font-family: 'Segoe UI', system-ui, sans-serif; }
  canvas { display: block; border: 2px solid #1a3a4a; border-radius: 4px; box-shadow: 0 8px 48px rgba(0,150,140,0.25), 0 2px 16px rgba(0,0,0,0.9); }
  #api-bar { width: 100%; display: flex; gap: 8px; margin-top: 8px; align-items: center; }
  #api-bar label { font-size: 10px; color: #006a5e; font-family: 'Courier New', monospace; white-space: nowrap; letter-spacing: 1px; }
  #api-key { flex: 1; background: #12101e; color: #00a090; border: 1px solid #1a3a4a; border-radius: 3px; padding: 5px 10px; font-size: 12px; font-family: 'Courier New', monospace; outline: none; }
  #api-key:focus { border-color: #006a5e; }
  #api-key::placeholder { color: #1a3a4a; }
  #api-save { background: #0c1820; color: #006a5e; border: 1px solid #1a3a4a; border-radius: 3px; padding: 5px 12px; font-size: 11px; cursor: pointer; font-family: 'Courier New', monospace; }
  #api-save:hover { background: #1a3a4a; color: #00a090; }
  #prompt-bar { display: none; }
  #status { font-size: 10px; color: #006a5e; margin-top: 4px; font-family: 'Courier New', monospace; letter-spacing: 1px; align-self: flex-start; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="api-bar">
  <label>ANTHROPIC KEY</label>
  <input id="api-key" type="password" placeholder="sk-ant-..." autocomplete="off" spellcheck="false">
  <button id="api-save">SAVE</button>
</div>
<div id="prompt-bar">
  <input id="prompt-input" type="text" placeholder="Give Claude a task..." autocomplete="off" spellcheck="false">
  <button id="prompt-send">DEPLOY</button>
</div>
<div id="status">connecting...</div>
<script>
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const statusEl    = document.getElementById('status');
const promptInput = document.getElementById('prompt-input');
const promptSend  = document.getElementById('prompt-send');
const apiKeyInput = document.getElementById('api-key');
const apiSaveBtn  = document.getElementById('api-save');

const savedKey = localStorage.getItem('anthropic_api_key') || '';
function setKeyHidden(h) { document.getElementById('api-bar').style.display = h ? 'none' : 'flex'; if (!h) apiKeyInput.focus(); }
if (savedKey) { apiKeyInput.value = savedKey; setKeyHidden(true); }
apiSaveBtn.addEventListener('click', () => {
  const k = apiKeyInput.value.trim();
  if (k) { localStorage.setItem('anthropic_api_key', k); statusEl.textContent = 'API key saved'; setKeyHidden(true); }
  else   { localStorage.removeItem('anthropic_api_key'); statusEl.textContent = 'API key cleared'; }
});
apiKeyInput.addEventListener('keydown', e => { if (e.key === 'Enter') apiSaveBtn.click(); });
statusEl.style.cursor = 'pointer'; statusEl.title = 'Click to change API key';
statusEl.addEventListener('click', () => setKeyHidden(false));

const W = 900, H = 560;
const DPR = window.devicePixelRatio || 1;
canvas.width = W*DPR; canvas.height = H*DPR;
ctx.scale(DPR, DPR);

function resizeCanvas() {
  const pad = 24;
  const minW = Math.round(1920 * 0.40);
  const maxW = Math.round(1920 * 0.80);
  const dw = Math.max(minW, Math.min(maxW, window.innerWidth - pad));
  const dh = Math.round(dw * H / W);
  canvas.style.width  = dw + 'px';
  canvas.style.height = dh + 'px';
  const bar = document.getElementById('api-bar');
  if (bar) bar.style.maxWidth = dw + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ─── PALETTE ──────────────────────────────────────────────────────────────────
const FLOOR_C      = '#0e1014';   // dark slate office floor
const SOCIAL_FLOOR = '#0c1018';   // slightly different social area
const WALL_C       = '#1a2028';   // outer wall — dark steel blue
const WINDOW_C     = '#0a2a3a';   // window glass (dark teal)
const WINDOW_GLOW  = '#0d4a6a';   // window highlight stripe
const WINDOW_SHINE = '#1a6a90';   // bright window shine
const CORE_C       = '#080c10';   // central core — near black concrete
const CORE_WALL    = '#182030';   // core wall border
const ELEV_DOOR    = '#101820';   // elevator door panel
const ELEV_FRAME   = '#1a3a54';   // elevator door frame
const STAIR_C      = '#0c1418';   // staircase
const DESK_TOP     = '#182030';   // desk surface — dark steel blue
const DESK_FACE    = '#0e1620';   // desk front
const DESK_LEG     = '#080e14';
const CHAIR_C      = '#12202e';   // chair — dark teal-blue
const CHAIR_SEAT   = '#1a3040';   // chair seat — slightly lighter
const COUCH_BACK   = '#0f1e30';
const COUCH_SEAT   = '#162840';
const COUCH_ARM    = '#0a1620';
const CARPET       = '#0c1520';   // social area carpet
const OUTLINE      = '#1a2a3a';   // outlines — dark teal
const SKIN         = '#f0c888';   // skin — unchanged
const PARTITION    = '#1a3a54';   // glass partition — teal
const TV_SCR       = '#050710';
const TBL_TOP      = '#141e2a';
const TBL_FACE     = '#0c1420';
const POT_C        = '#1a3a4a';   // plant pot — dark teal
const LEAF_G       = '#1a4a2a';
const LEAF_DK      = '#0e2a18';

// Teal accent color (replaces all purple accent usage)
const ACCENT       = '#00b4a0';   // main teal accent
const ACCENT_DIM   = '#006a5e';   // dimmer teal

const ACTION_COLORS = {
  thinking:'#9966ff', reading:'#ffaa22', typing:'#22dd88',
  terminal:'#22ee44', browsing:'#3388ff', responding:'#cc66ff',
  receiving:'#22eecc', spawning:'#ff7722', searching:'#ffee22',
  tool:'#88ee22', idle:'#554466',
};
const ACTION_LABELS = {
  thinking:'THINKING', reading:'READING', typing:'WRITING',
  terminal:'TERMINAL', browsing:'BROWSING', responding:'SPEAKING',
  receiving:'RECEIVING', spawning:'SPAWNING', searching:'LOADING',
  tool:'TOOL', idle:'IDLE',
};
const AGENT_COLORS = ['#e83878','#28c87a','#2888e8','#e8b828','#9838e8','#e83828','#28c8d8','#e87828'];
const HAIR_COLS   = ['#1a1018','#2a1a08','#3a2010','#18100c','#382808','#160e0c'];

// ─── LAYOUT ───────────────────────────────────────────────────────────────────
const DESK_SLOTS = 8;

// 8 individual desks (left wing + right wing) + 2 group tables (social area)
const BUILDING_SLOTS = [
  // Left wing desks (4 desks, 2 cols x 2 rows) — left of core
  { x: 130, y: 145 },  // slot 0
  { x: 215, y: 145 },  // slot 1
  { x: 130, y: 228 },  // slot 2
  { x: 215, y: 228 },  // slot 3
  // Right wing desks (4 desks, 2 cols x 2 rows) — right of core
  { x: 685, y: 145 },  // slot 4
  { x: 770, y: 145 },  // slot 5
  { x: 685, y: 228 },  // slot 6
  { x: 770, y: 228 },  // slot 7
  // Group tables in social area (bottom)
  { x: 280, y: 458 },  // slot 8
  { x: 620, y: 458 },  // slot 9
];

const LOUNGE_GATE = { x: 450, y: 440 };

function workPos(agent) {
  const idx = agent.slotIdx;
  const s = BUILDING_SLOTS[idx];
  if (idx >= DESK_SLOTS) {
    const xOff = [-60, -20, 20, 60];
    const others = [...agents.values()].filter(a => a.slotIdx === idx);
    const posIdx = others.filter(a => a.colorIdx < agent.colorIdx).length;
    return { x: s.x + (xOff[posIdx % 4] || 0), y: s.y + 34 };
  }
  return { x: s.x, y: s.y + 32 };
}

// ─── AGENTS ───────────────────────────────────────────────────────────────────
const agents = new Map();
let colorIdx = 0;
const recentSpawners = new Map();
const IDLE_TIMEOUT = 50000;

function isSlotTaken(idx) {
  if (idx >= DESK_SLOTS) {
    let n = 0; for (const a of agents.values()) if (a.slotIdx === idx) n++;
    return n >= 4;
  }
  for (const a of agents.values()) if (a.slotIdx === idx) return true;
  return false;
}

function assignSlot(sessionId, projectDir) {
  const ex = agents.get(sessionId);
  if (ex?.slotIdx != null) return ex.slotIdx;
  const spawner = recentSpawners.get(projectDir);
  if (spawner && Date.now() - spawner.time < 90000 && spawner.sessionId !== sessionId) {
    for (let i = DESK_SLOTS; i < BUILDING_SLOTS.length; i++)
      if (!isSlotTaken(i)) return i;
  }
  for (let i = 0; i < DESK_SLOTS; i++)
    if (!isSlotTaken(i)) return i;
  return DESK_SLOTS;
}

function getOrCreate(sessionId, projectDir) {
  if (!agents.has(sessionId)) {
    const ci = colorIdx % AGENT_COLORS.length;
    agents.set(sessionId, {
      id: sessionId, name: projectDir,
      color: AGENT_COLORS[ci], colorIdx: colorIdx++,
      pos: { x: LOUNGE_GATE.x, y: LOUNGE_GATE.y },
      slotIdx: null, waypoints: [],
      phase: 'idle', action: 'idle',
      bubbleText: '', bubbleLife: 0,
      lastEvent: Date.now(),
      facing: 'right', walkTick: 0, buildProgress: 0,
    });
  }
  return agents.get(sessionId);
}

// ─── PATHFINDING ──────────────────────────────────────────────────────────────
const CORE_X1 = 340, CORE_X2 = 560, CORE_Y2 = 300;

function planPathToWork(agent) {
  const dst = workPos(agent);
  if (agent.slotIdx >= DESK_SLOTS) {
    // Group tables in social area — walk straight
    agent.waypoints = [dst];
    return;
  }
  if (dst.x < CORE_X1) {
    // Left wing: go left to bypass corridor, then up to desk row, then to desk
    agent.waypoints = [
      { x: CORE_X1 - 55, y: agent.pos.y },
      { x: CORE_X1 - 55, y: dst.y },
      dst,
    ];
  } else {
    // Right wing: go right to bypass corridor, then up, then to desk
    agent.waypoints = [
      { x: CORE_X2 + 55, y: agent.pos.y },
      { x: CORE_X2 + 55, y: dst.y },
      dst,
    ];
  }
}

function planPathToLounge(agent) {
  const lx = 160 + (agent.colorIdx % 7) * 90;
  const ly = 430 + (agent.colorIdx % 3) * 18;
  if (agent.slotIdx == null || agent.slotIdx >= DESK_SLOTS) {
    agent.waypoints = [{ x: lx, y: ly }];
    return;
  }
  if (agent.pos.x < CORE_X1) {
    // From left wing
    agent.waypoints = [
      { x: CORE_X1 - 55, y: agent.pos.y },
      { x: CORE_X1 - 55, y: CORE_Y2 + 55 },
      { x: lx, y: ly },
    ];
  } else {
    // From right wing
    agent.waypoints = [
      { x: CORE_X2 + 55, y: agent.pos.y },
      { x: CORE_X2 + 55, y: CORE_Y2 + 55 },
      { x: lx, y: ly },
    ];
  }
}

// ─── DRAWING PRIMITIVES ───────────────────────────────────────────────────────
function rr(x, y, w, h, r) {
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}
function gBox(x,y,w,h,fill,r=3,sw=1.5) {
  ctx.fillStyle=fill; rr(x,y,w,h,r); ctx.fill();
  ctx.strokeStyle=OUTLINE; ctx.lineWidth=sw; rr(x,y,w,h,r); ctx.stroke();
}
function hexRgba(hex,a) {
  const n=parseInt(hex.slice(1),16);
  return `rgba(${n>>16},${(n>>8)&255},${n&255},${a})`;
}

// ─── PLANT ────────────────────────────────────────────────────────────────────
function drawPlant(cx, cy) {
  ctx.fillStyle = POT_C;
  rr(cx-7, cy-4, 14, 12, 2); ctx.fill();
  ctx.strokeStyle=OUTLINE; ctx.lineWidth=1; rr(cx-7, cy-4, 14, 12, 2); ctx.stroke();
  ctx.fillStyle = '#904820'; ctx.fillRect(cx-8, cy-2, 16, 2);
  const leaves = [[0,-10],[-7,-14],[7,-14],[-3,-18],[4,-19],[0,-22]];
  for (const [ox,oy] of leaves) {
    ctx.fillStyle = LEAF_G;
    ctx.beginPath(); ctx.ellipse(cx+ox, cy+oy, 6, 4, ox*0.08, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle=LEAF_DK; ctx.lineWidth=0.8; ctx.stroke();
  }
}

// ─── CENTRAL CORE ─────────────────────────────────────────────────────────────
function drawCentralCore() {
  const cx1=340, cy1=90, cx2=560, cy2=300;
  const cw=cx2-cx1, ch=cy2-cy1;

  // Core block shadow
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.fillRect(cx1+4, cy1+4, cw, ch);

  // Core outer wall
  ctx.fillStyle=CORE_C;
  ctx.fillRect(cx1, cy1, cw, ch);
  ctx.strokeStyle=CORE_WALL; ctx.lineWidth=3;
  ctx.strokeRect(cx1, cy1, cw, ch);

  // ── Left elevator bay (2 elevators) ──────────────────────────────
  const elevW=52, elevH=90;
  const el1y=cy1+20;
  const el2y=cy1+130;

  [el1y, el2y].forEach((ey, ei) => {
    const elx = cx1+14;
    ctx.fillStyle='#080e14';
    ctx.fillRect(elx, ey, elevW, elevH);
    ctx.strokeStyle=ELEV_FRAME; ctx.lineWidth=2;
    ctx.strokeRect(elx, ey, elevW, elevH);
    // LED strip above door
    ctx.fillStyle='rgba(0,220,200,0.6)'; ctx.fillRect(elx, ey, elevW, 3);
    ctx.fillStyle=ELEV_DOOR;
    ctx.fillRect(elx+3, ey+10, elevW/2-5, elevH-20);
    ctx.fillRect(elx+elevW/2+2, ey+10, elevW/2-5, elevH-20);
    ctx.strokeStyle='rgba(0,100,90,0.5)'; ctx.lineWidth=1;
    ctx.strokeRect(elx+3, ey+10, elevW/2-5, elevH-20);
    ctx.strokeRect(elx+elevW/2+2, ey+10, elevW/2-5, elevH-20);
    ctx.strokeStyle='rgba(0,60,55,0.8)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(elx+elevW/2, ey+10); ctx.lineTo(elx+elevW/2, ey+elevH-10); ctx.stroke();
    ctx.fillStyle=ELEV_FRAME;
    ctx.fillRect(elx+elevW-8, ey+elevH/2-16, 6, 12);
    ctx.fillStyle='rgba(0,220,200,0.8)';
    ctx.beginPath(); ctx.arc(elx+elevW-5, ey+elevH/2-12, 2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(0,220,200,0.2)';
    ctx.beginPath(); ctx.arc(elx+elevW-5, ey+elevH/2-12, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(0,180,160,0.4)';
    ctx.beginPath(); ctx.arc(elx+elevW-5, ey+elevH/2-6, 2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(0,200,185,0.7)'; ctx.font='7px "Courier New"'; ctx.textAlign='center';
    ctx.fillText('LIFT ' + (ei+1), elx+elevW/2, ey+elevH-3);
  });

  // ── Right elevator bay ────────────────────────────────────────────
  const erx = cx2-14-elevW;
  [el1y, el2y].forEach((ey, ei) => {
    ctx.fillStyle='#080e14';
    ctx.fillRect(erx, ey, elevW, elevH);
    ctx.strokeStyle=ELEV_FRAME; ctx.lineWidth=2;
    ctx.strokeRect(erx, ey, elevW, elevH);
    // LED strip above door
    ctx.fillStyle='rgba(0,220,200,0.6)'; ctx.fillRect(erx, ey, elevW, 3);
    ctx.fillStyle=ELEV_DOOR;
    ctx.fillRect(erx+3, ey+10, elevW/2-5, elevH-20);
    ctx.fillRect(erx+elevW/2+2, ey+10, elevW/2-5, elevH-20);
    ctx.strokeStyle='rgba(0,100,90,0.5)'; ctx.lineWidth=1;
    ctx.strokeRect(erx+3, ey+10, elevW/2-5, elevH-20);
    ctx.strokeRect(erx+elevW/2+2, ey+10, elevW/2-5, elevH-20);
    ctx.strokeStyle='rgba(0,60,55,0.8)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(erx+elevW/2, ey+10); ctx.lineTo(erx+elevW/2, ey+elevH-10); ctx.stroke();
    ctx.fillStyle=ELEV_FRAME; ctx.fillRect(erx+2, ey+elevH/2-16, 6, 12);
    ctx.fillStyle='rgba(0,220,200,0.8)';
    ctx.beginPath(); ctx.arc(erx+5, ey+elevH/2-12, 2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(0,220,200,0.2)';
    ctx.beginPath(); ctx.arc(erx+5, ey+elevH/2-12, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(0,180,160,0.4)';
    ctx.beginPath(); ctx.arc(erx+5, ey+elevH/2-6, 2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(0,200,185,0.7)'; ctx.font='7px "Courier New"'; ctx.textAlign='center';
    ctx.fillText('LIFT ' + (ei+3), erx+elevW/2, ey+elevH-3);
  });

  // ── Central staircase ─────────────────────────────────────────────
  const sx=cx1+80, sy=cy1+16, sw=cw-160, sh=ch-32;
  ctx.fillStyle=STAIR_C;
  ctx.fillRect(sx, sy, sw, sh);
  ctx.strokeStyle='rgba(0,80,75,0.5)'; ctx.lineWidth=1;
  ctx.strokeRect(sx, sy, sw, sh);

  const stepCount = 12;
  const stepH = sh / stepCount;
  for (let si=0; si<stepCount; si++) {
    const sy2 = sy + si*stepH;
    ctx.fillStyle = si%2===0 ? '#0e1820' : '#0a1418';
    ctx.fillRect(sx+2, sy2, sw-4, stepH-1);
    ctx.strokeStyle='rgba(0,90,85,0.4)'; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.moveTo(sx+2, sy2+stepH-1); ctx.lineTo(sx+sw-2, sy2+stepH-1); ctx.stroke();
  }
  ctx.strokeStyle='rgba(0,140,130,0.5)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(sx+8, sy+8); ctx.lineTo(sx+8, sy+sh-8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(sx+sw-8, sy+8); ctx.lineTo(sx+sw-8, sy+sh-8); ctx.stroke();

  ctx.fillStyle='rgba(0,180,165,0.7)'; ctx.font='bold 9px "Courier New"'; ctx.textAlign='center';
  ctx.fillText('STAIRS', cx1+cw/2, cy1+ch/2+4);
  ctx.fillStyle='rgba(0,140,130,0.5)'; ctx.font='8px "Courier New"';
  ctx.fillText('\u25b2 FLOOR 14 \u25bc', cx1+cw/2, cy1+ch-6);

  ctx.fillStyle='rgba(0,200,180,0.12)';
  ctx.fillRect(cx1, cy1, cw, 3);
  ctx.fillRect(cx1, cy2-3, cw, 3);
  ctx.fillRect(cx1, cy1, 3, ch);
  ctx.fillRect(cx2-3, cy1, 3, ch);
}

// ─── BACKGROUND ───────────────────────────────────────────────────────────────
function drawBackground() {
  ctx.fillStyle = FLOOR_C;
  ctx.fillRect(0, 0, W, H);

  ctx.strokeStyle='rgba(0,150,140,0.035)'; ctx.lineWidth=1;
  for (let x=0; x<W; x+=50) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y=0; y<H; y+=50) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  ctx.fillStyle = WALL_C;
  ctx.fillRect(0, 0, W, 20);
  ctx.fillRect(0, H-20, W, 20);
  ctx.fillRect(0, 0, 20, H);
  ctx.fillRect(W-20, 0, 20, H);

  // Top windows
  for (let wx=50; wx<W-50; wx+=60) {
    ctx.fillStyle='#0a2030'; ctx.fillRect(wx, 2, 36, 16);
    ctx.fillStyle=WINDOW_GLOW; ctx.fillRect(wx, 2, 36, 3);
    ctx.fillStyle=WINDOW_SHINE; ctx.fillRect(wx+35, 2, 1, 16);
    ctx.strokeStyle='rgba(0,140,130,0.4)'; ctx.lineWidth=0.5; ctx.strokeRect(wx,2,36,16);
  }
  // Left windows
  for (let wy=50; wy<H-80; wy+=65) {
    ctx.fillStyle='#0a2030'; ctx.fillRect(2, wy, 16, 40);
    ctx.fillStyle=WINDOW_GLOW; ctx.fillRect(2, wy, 3, 40);
    ctx.fillStyle=WINDOW_SHINE; ctx.fillRect(2, wy+39, 16, 1);
    ctx.strokeStyle='rgba(0,140,130,0.4)'; ctx.lineWidth=0.5; ctx.strokeRect(2,wy,16,40);
  }
  // Right windows
  for (let wy=50; wy<H-80; wy+=65) {
    ctx.fillStyle='#0a2030'; ctx.fillRect(W-18, wy, 16, 40);
    ctx.fillStyle=WINDOW_GLOW; ctx.fillRect(W-18+13, wy, 3, 40);
    ctx.fillStyle=WINDOW_SHINE; ctx.fillRect(W-18+15, wy, 1, 40);
    ctx.strokeStyle='rgba(0,140,130,0.4)'; ctx.lineWidth=0.5; ctx.strokeRect(W-18,wy,16,40);
  }
  // Bottom windows
  for (let wx=50; wx<W-50; wx+=70) {
    ctx.fillStyle='#0a2030'; ctx.fillRect(wx, H-18, 44, 16);
    ctx.fillStyle='rgba(0,140,130,0.15)'; ctx.fillRect(wx, H-18, 44, 16);
    ctx.strokeStyle='rgba(0,140,130,0.4)'; ctx.lineWidth=0.5; ctx.strokeRect(wx,H-18,44,16);
  }

  // Social area carpet
  ctx.fillStyle = SOCIAL_FLOOR;
  ctx.fillRect(20, 368, W-40, H-40-368);
  ctx.strokeStyle='rgba(0,140,130,0.06)'; ctx.lineWidth=1;
  for (let x=20; x<W-20; x+=12) { ctx.beginPath(); ctx.moveTo(x,368); ctx.lineTo(x,H-20); ctx.stroke(); }
  for (let y=368; y<H-20; y+=12) { ctx.beginPath(); ctx.moveTo(20,y); ctx.lineTo(W-20,y); ctx.stroke(); }

  // Glass wall with door opening
  const DOOR_X = 420, DOOR_W = 60;

// ─── DESK ─────────────────────────────────────────────────────────────────────
function drawDesk(slotIdx, agentsHere) {
  const s = BUILDING_SLOTS[slotIdx];
  const cx=s.x, cy=s.y;
  const DW=54, DH=36;
  const agent = agentsHere[0];
  const aCol = agent ? (ACTION_COLORS[agent.action]||ACTION_COLORS.idle) : ACTION_COLORS.idle;
  const active = agent && agent.action !== 'idle' && agent.phase === 'working';

  ctx.fillStyle = 'rgba(0,0,0,0.38)';
  ctx.beginPath(); ctx.ellipse(cx+2, cy+DH/2+20, DW/2+8, 9, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.beginPath(); ctx.ellipse(cx, cy+DH/2+18, 11, 4, 0, 0, Math.PI*2); ctx.fill();

  ctx.fillStyle = '#0a1420';
  [[-9,12],[9,12],[-9,20],[9,20]].forEach(([ox,oy]) => {
    ctx.fillRect(cx+ox-1, cy+DH/2+oy, 2, 5);
  });

  ctx.fillStyle = active ? CHAIR_C : hexRgba(CHAIR_C, 0.7);
  rr(cx-11, cy+DH/2+5, 22, 15, 4); ctx.fill();

  rr(cx-10, cy+DH/2+1, 20, 7, 2); ctx.fill();
  ctx.strokeStyle=OUTLINE; ctx.lineWidth=0.8; rr(cx-10, cy+DH/2+1, 20, 7, 2); ctx.stroke();

  const legW=5, legH=11;
  ctx.fillStyle = DESK_LEG;
  ctx.fillRect(cx-DW/2+3,  cy+DH/2-1, legW, legH);
  ctx.fillRect(cx+DW/2-8,  cy+DH/2-1, legW, legH);
  ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=0.5;
  ctx.strokeRect(cx-DW/2+3,  cy+DH/2-1, legW, legH);
  ctx.strokeRect(cx+DW/2-8,  cy+DH/2-1, legW, legH);

  ctx.fillStyle = DESK_FACE;
  rr(cx-DW/2, cy+DH/2-6, DW, 9, 1); ctx.fill();
  ctx.strokeStyle=OUTLINE; ctx.lineWidth=1; rr(cx-DW/2, cy+DH/2-6, DW, 9, 1); ctx.stroke();

// ─── GROUP TABLE ──────────────────────────────────────────────────────────────
function drawGroupTable(slotIdx, agentsHere) {
  const s = BUILDING_SLOTS[slotIdx];
  const cx=s.x, cy=s.y;
  const TW=168, TH=58;
  const chairXs = [cx-57, cx-19, cx+19, cx+57];

  ctx.fillStyle='rgba(0,0,0,0.4)';
  ctx.beginPath(); ctx.ellipse(cx+3, cy+TH/2+18, TW/2+12, 12, 0, 0, Math.PI*2); ctx.fill();

  ctx.fillStyle='rgba(0,0,0,0.2)';
  for (const lx of chairXs) {
    ctx.beginPath(); ctx.ellipse(lx, cy+TH/2+20, 10, 4, 0, 0, Math.PI*2); ctx.fill();
  }

  for (let i=0; i<3; i++) {
    const tx = cx-44+i*44;
    ctx.fillStyle = hexRgba(CHAIR_C, 0.4);
    rr(tx-10, cy-TH/2-14, 20, 14, 3); ctx.fill();
    ctx.strokeStyle=OUTLINE; ctx.lineWidth=0.6; rr(tx-10, cy-TH/2-14, 20, 14, 3); ctx.stroke();
    ctx.fillStyle = '#0a1420';
    [[-8,13],[8,13]].forEach(([ox,oy]) => ctx.fillRect(tx+ox-1, cy-TH/2-14+oy, 2, 5));
  }

  for (let i=0; i<4; i++) {
    const lx = chairXs[i];
    const occ = i < agentsHere.length;
    ctx.fillStyle = '#0a1420';
    [[-8,13],[8,13]].forEach(([ox,oy]) => ctx.fillRect(lx+ox-1, cy+TH/2+4+oy, 2, 5));
    ctx.fillStyle = occ ? CHAIR_C : hexRgba(CHAIR_C, 0.5);
    rr(lx-10, cy+TH/2+4, 20, 14, 3); ctx.fill();
    ctx.strokeStyle=OUTLINE; ctx.lineWidth=occ?1.1:0.6; rr(lx-10, cy+TH/2+4, 20, 14, 3); ctx.stroke();
    ctx.fillStyle = occ ? CHAIR_SEAT : hexRgba(CHAIR_SEAT, 0.45);
    rr(lx-9, cy+TH/2+4, 18, 6, 2); ctx.fill();
  }

  const tlegH=13, tlegW=6;
  ctx.fillStyle = TBL_FACE;
  [[cx-TW/2+5], [cx-TW/2+55], [cx+TW/2-61], [cx+TW/2-11]].forEach(([lx]) => {
    ctx.fillRect(lx, cy+TH/2-2, tlegW, tlegH);
    ctx.strokeStyle='rgba(0,0,0,0.45)'; ctx.lineWidth=0.5;
    ctx.strokeRect(lx, cy+TH/2-2, tlegW, tlegH);
  });

  ctx.fillStyle = TBL_FACE;
  rr(cx-TW/2, cy+TH/2-7, TW, 10, 1); ctx.fill();
  ctx.strokeStyle=OUTLINE; ctx.lineWidth=1.1; rr(cx-TW/2, cy+TH/2-7, TW, 10, 1); ctx.stroke();

  ctx.fillStyle = TBL_TOP;
  rr(cx-TW/2, cy-TH/2, TW, TH, 3); ctx.fill();
  ctx.strokeStyle=OUTLINE; ctx.lineWidth=1.5; rr(cx-TW/2, cy-TH/2, TW, TH, 3); ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,0.04)'; ctx.lineWidth=1;
  for (let gx=cx-TW/2+12; gx<cx+TW/2-6; gx+=15) {
    ctx.beginPath(); ctx.moveTo(gx, cy-TH/2+3); ctx.lineTo(gx+4, cy+TH/2-3); ctx.stroke();
  }

  for (let i=0; i<4; i++) {
    const lx = chairXs[i];
    const a = agentsHere[i];
    const aCol = a ? (ACTION_COLORS[a.action]||ACTION_COLORS.idle) : null;
    const on = a && a.action !== 'idle' && a.phase === 'working';
    ctx.fillStyle = a ? '#0e1c28' : hexRgba('#0e1c28', 0.4);
    rr(lx-11, cy+6, 22, 14, 2); ctx.fill();
    ctx.fillStyle = on ? hexRgba(aCol,0.82) : TV_SCR;
    rr(lx-10, cy+7, 20, 12, 1); ctx.fill();
    if (on) {
      ctx.fillStyle = hexRgba(aCol, 0.09+Math.sin(tick*0.05+i)*0.04);
      ctx.beginPath(); ctx.ellipse(lx, cy+12, 24, 18, 0, 0, Math.PI*2); ctx.fill();
    }
  }

  ctx.fillStyle='#0e1c28';
  rr(cx-9, cy-10, 18, 22, 3); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=0.8; rr(cx-9, cy-10, 18, 22, 3); ctx.stroke();
  ctx.fillStyle='rgba(0,140,130,0.5)';
  rr(cx-7, cy-8, 14, 17, 2); ctx.fill();
}

// ─── WORKER ───────────────────────────────────────────────────────────────────
function drawWorker(a) {
  const {pos:{x,y}, color, action, walkTick, phase, colorIdx:ci} = a;
  const walking = a.waypoints.length > 0;
  const bob = walking ? 0 : Math.sin(tick*0.045+ci)*0.9;
  const aCol = ACTION_COLORS[action]||ACTION_COLORS.idle;

  ctx.fillStyle='rgba(0,0,0,0.16)';
  ctx.beginPath(); ctx.ellipse(x+1,y+7,8,3,0,0,Math.PI*2); ctx.fill();

  const sw = walking ? Math.sin(walkTick*0.38)*5 : 0;
  ctx.fillStyle='#0e1c28';
  ctx.fillRect(x-5,y+3+sw,4,7);
  ctx.fillRect(x+1,y+3-sw,4,7);
  ctx.fillStyle='#080e14';
  ctx.fillRect(x-6,y+8+sw,5,3);
  ctx.fillRect(x+1,y+8-sw,5,3);

  ctx.fillStyle=color;
  ctx.beginPath(); ctx.ellipse(x,y+bob,8,10,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=hexRgba(OUTLINE,0.65); ctx.lineWidth=1; ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,0.14)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(x-2,y-8+bob); ctx.lineTo(x,y-4+bob); ctx.lineTo(x+2,y-8+bob); ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.18)';
  ctx.fillRect(x-5,y-3+bob,5,5);
  ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=0.5;
  ctx.strokeRect(x-5,y-3+bob,5,5);
  ctx.fillStyle='#e83878'; ctx.fillRect(x-4,y-5+bob,1,4);
  ctx.fillStyle='#2888e8'; ctx.fillRect(x-2,y-5+bob,1,4);

  ctx.fillStyle=SKIN;
  ctx.beginPath(); ctx.arc(x,y-8+bob,7,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=hexRgba(OUTLINE,0.5); ctx.lineWidth=1; ctx.stroke();
  ctx.fillStyle=HAIR_COLS[ci%6];
  ctx.beginPath(); ctx.arc(x,y-9+bob,7,Math.PI,0); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#0a1420';
  ctx.fillRect(x-3,y-10+bob,2,2);
  ctx.fillRect(x+1,y-10+bob,2,2);
  ctx.strokeStyle='#0a1e2a'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.arc(x-2,y-10+bob,2.5,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(x+2,y-10+bob,2.5,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-4.5,y-10+bob); ctx.lineTo(x+4.5,y-10+bob); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-4.5,y-10+bob); ctx.lineTo(x-7,y-9+bob); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+4.5,y-10+bob); ctx.lineTo(x+7,y-9+bob); ctx.stroke();

  if (action !== 'idle' && phase === 'working') {
    ctx.fillStyle=hexRgba(aCol,0.06+Math.sin(tick*0.06)*0.03);
    ctx.beginPath(); ctx.ellipse(x,y,18,22,0,0,Math.PI*2); ctx.fill();
  }

  if (action !== 'idle' && action !== 'thinking' && phase === 'working') {
    ctx.strokeStyle=SKIN; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(x+6,y-2+bob); ctx.lineTo(x+12,y-11+bob); ctx.stroke();
    ctx.save(); ctx.translate(0, bob); drawOfficeTool(x, y, action, aCol); ctx.restore();
  }

  if (action === 'thinking' && phase === 'working') {
    const ph=(tick*0.07)%(Math.PI*2);
    [0,1,2].forEach(i => {
      ctx.globalAlpha=0.4+Math.sin(ph+i*1.0)*0.35;
      ctx.fillStyle=ACTION_COLORS.thinking;
      ctx.beginPath(); ctx.arc(x-5+i*5,y-22+bob-Math.sin(ph+i)*4,3,0,Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha=1;
  }
}

function drawOfficeTool(x, y, action, aCol) {
  if (action === 'reading') {
    ctx.fillStyle='#2a4488'; rr(x+5,y-18,12,9,1); ctx.fill();
    ctx.fillStyle='rgba(200,220,255,0.8)'; rr(x+6,y-17,10,7,1); ctx.fill();
  } else if (action === 'typing') {
    ctx.fillStyle='#0e1c28'; rr(x+5,y-20,14,10,1); ctx.fill();
    ctx.fillStyle=hexRgba(aCol,0.75); rr(x+6,y-19,12,8,1); ctx.fill();
  } else if (action === 'terminal') {
    ctx.fillStyle='#0a1018'; rr(x+5,y-20,14,12,1); ctx.fill();
    ctx.fillStyle='#22ee44'; ctx.font='5px "Courier New"'; ctx.textAlign='left'; ctx.fillText('>_',x+7,y-11);
  } else if (action === 'browsing') {
    ctx.fillStyle='#0e1e2a'; rr(x+8,y-20,9,15,2); ctx.fill();
    ctx.fillStyle=hexRgba(aCol,0.65); rr(x+9,y-18,7,10,1); ctx.fill();
  } else if (action === 'spawning') {
    ctx.strokeStyle='#ccccaa'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(x+6,y-20); ctx.lineTo(x+14,y-8); ctx.stroke();
    ctx.fillStyle='#ffee88'; ctx.beginPath(); ctx.arc(x+6,y-20,3,0,Math.PI*2); ctx.fill();
  } else if (action === 'searching') {
    ctx.strokeStyle='#ffee22'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(x+10,y-15,5,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+14,y-11); ctx.lineTo(x+17,y-8); ctx.stroke();
  } else {
    ctx.fillStyle=aCol; ctx.globalAlpha=0.85;
    ctx.beginPath(); ctx.arc(x+11,y-14,4,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }
}

// ─── OVERLAYS ─────────────────────────────────────────────────────────────────
function drawWorkerLabel(a) {
  if (a.phase === 'idle') return;
  const {pos:{x,y}, name, action} = a;
  const aCol = ACTION_COLORS[action]||ACTION_COLORS.idle;
  const lbl = action !== 'idle' ? (ACTION_LABELS[action]||action.toUpperCase()).slice(0,9) : name.slice(0,10);
  ctx.font='bold 9px "Segoe UI",system-ui';
  const tw=ctx.measureText(lbl).width, bw=tw+10, bh=14;
  ctx.fillStyle='rgba(14,12,28,0.88)'; rr(x-bw/2,y-30,bw,bh,5); ctx.fill();
  ctx.strokeStyle=hexRgba(aCol,0.6); ctx.lineWidth=1; rr(x-bw/2,y-30,bw,bh,5); ctx.stroke();
  ctx.fillStyle=aCol; ctx.textAlign='center'; ctx.fillText(lbl,x,y-19);
}

function drawBubble(a) {
  if (a.bubbleLife <= 0) return;
  const {pos:{x,y}, bubbleText, bubbleLife, color} = a;
  const alpha = Math.min(1,bubbleLife/30);
  const text = bubbleText.length>32 ? bubbleText.slice(0,32)+'...' : bubbleText;
  ctx.font='11px "Segoe UI",system-ui';
  const tw=ctx.measureText(text).width, bw=tw+16, bh=22;
  const bx=Math.max(10,Math.min(W-bw-10,x-bw/2)), by=y-56;
  ctx.save(); ctx.globalAlpha=alpha;
  gBox(bx,by,bw,bh,'#0a1820',5,1.5);
  ctx.strokeStyle=hexRgba(color,0.6); ctx.lineWidth=1.5; rr(bx,by,bw,bh,5); ctx.stroke();
  const tx=Math.max(bx+8,Math.min(bx+bw-8,x));
  ctx.fillStyle='#0a1820';
  ctx.beginPath(); ctx.moveTo(tx-4,by+bh); ctx.lineTo(tx+4,by+bh); ctx.lineTo(tx,by+bh+5); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#c0e8e4'; ctx.textAlign='left';
  ctx.beginPath(); rr(bx+1,by+1,bw-2,bh-2,4); ctx.clip(); ctx.fillText(text,bx+8,by+15);
  ctx.restore();
}

function drawTitleBar() {
  ctx.fillStyle='rgba(8,10,14,0.96)'; ctx.fillRect(0,0,W,18);
  ctx.font='10px "Courier New"'; ctx.fillStyle=`rgba(0,200,185,0.95)`; ctx.textAlign='left';
  ctx.fillText('[ ] OFFICE TOWER  //  CLAUDE CODE VISUALIZER', 10, 13);
  ctx.fillStyle=`rgba(0,160,150,0.75)`; ctx.textAlign='right';
  const working=[...agents.values()].filter(a=>a.phase==='working').length;
  ctx.fillText(`${agents.size} agent${agents.size!==1?'s':''} \u00b7 ${working} working`, W-10, 13);
}

function drawEmptyState() {
  ctx.textAlign='center';
  ctx.fillStyle='rgba(0,200,185,0.5)'; ctx.font='16px "Segoe UI",system-ui';
  ctx.fillText('No agents on the floor', W/2, H/2-10);
  ctx.fillStyle='rgba(0,160,150,0.4)'; ctx.font='12px "Segoe UI",system-ui';
  ctx.fillText('Start Claude Code to see activity', W/2, H/2+14);
}

// ─── DEMO MODE ────────────────────────────────────────────────────────────────
const DEMO_SESSIONS = [
  { id: 'demo-0', name: 'play-web'  },
  { id: 'demo-1', name: 'play-ctv'  },
  { id: 'demo-2', name: 'play-ios'  },
  { id: 'demo-3', name: 'play-and'  },
  { id: 'demo-4', name: 'ai-feed'   },
  { id: 'demo-5', name: 'ai-cont'   },
  { id: 'demo-6', name: 'player'    },
  { id: 'demo-7', name: 'config'    },
];

const DEMO_BUBBLES = {
  thinking:   ['Hmm, what if...', 'Computing...', 'Let me think...', 'Analyzing...'],
  reading:    ['Reading docs...', 'Checking spec...', 'Reviewing code...', 'Scanning file...'],
  typing:     ['Writing code...', 'Implementing...', 'Fixing the bug...', 'Adding feature...'],
  terminal:   ['Running tests...', 'npm install...', 'git status', 'Compiling...'],
  browsing:   ['Searching docs...', 'Fetching data...', 'Checking PR...', 'Loading page...'],
  responding: ['Sending reply...', 'Explaining...', 'Almost done!', 'Here you go!'],
  spawning:   ['Spawning agent...', 'Launching task...', 'Deploying...', 'Starting job...'],
  tool:       ['Using tool...', 'Executing...', 'Running cmd...', 'Calling API...'],
  searching:  ['Finding files...', 'Scanning repo...', 'Grep-ing...', 'Searching...'],
};
const DEMO_ACTIONS = Object.keys(DEMO_BUBBLES);

function demoBubble(action) {
  const list = DEMO_BUBBLES[action] || ['Working...'];
  return list[Math.floor(Math.random() * list.length)];
}

function runDemo() {
  statusEl.textContent = 'demo mode — agents incoming';

  // Spawn agents one by one with a stagger
  DEMO_SESSIONS.forEach((s, i) => {
    setTimeout(() => {
      const agent = getOrCreate(s.id, s.name);
      agent.slotIdx = i;
      const action = DEMO_ACTIONS[i % DEMO_ACTIONS.length];
      agent.action = action;
      agent.bubbleText = demoBubble(action);
      agent.bubbleLife = 200;
      agent.lastEvent = Date.now();
      agent.phase = 'to_work';
      planPathToWork(agent);
    }, i * 700);
  });

  // Cycle actions every ~4s while agents are working
  const cycleInterval = setInterval(() => {
    for (const a of agents.values()) {
      if (!a.id.startsWith('demo-') || a.phase !== 'working') continue;
      const action = DEMO_ACTIONS[Math.floor(Math.random() * DEMO_ACTIONS.length)];
      a.action = action;
      a.bubbleText = demoBubble(action);
      a.bubbleLife = 200;
      a.lastEvent = Date.now(); // keep idle timeout at bay
    }
  }, 4000);

  // After 30s send all demo agents home
  setTimeout(() => {
    clearInterval(cycleInterval);
    statusEl.textContent = 'demo — agents returning';
    for (const a of agents.values()) {
      if (!a.id.startsWith('demo-')) continue;
      a.phase = 'to_idle';
      a.action = 'idle';
      a.buildProgress = 0;
      a.bubbleText = 'See ya! 👋';
      a.bubbleLife = 160;
      planPathToLounge(a);
    }
    // Remove demo agents after they've had time to walk back
    setTimeout(() => {
      for (const id of [...agents.keys()])
        if (id.startsWith('demo-')) agents.delete(id);
      statusEl.textContent = 'demo ended — start Claude Code to see real agents';
    }, 9000);
  }, 30000);
}

// ─── SSE ──────────────────────────────────────────────────────────────────────
function connect() {
  const es = new EventSource('/events');
  es.onopen  = () => { statusEl.textContent = 'connected \u2014 watching sessions'; };
  es.onerror = () => { statusEl.textContent = 'reconnecting...'; es.close(); setTimeout(connect, 2000); };
  es.onmessage = e => {
    const ev    = JSON.parse(e.data);
    const agent = getOrCreate(ev.sessionId, ev.projectDir);
    if (ev.action === 'spawning')
      recentSpawners.set(ev.projectDir, { sessionId: ev.sessionId, time: Date.now() });
    agent.action    = ev.action;
    agent.lastEvent = ev.timestamp ? new Date(ev.timestamp).getTime() : Date.now();
    agent.bubbleText = ev.detail;
    agent.bubbleLife = 240;
    if (agent.slotIdx == null)
      agent.slotIdx = assignSlot(ev.sessionId, ev.projectDir);
    const age = ev.timestamp ? Date.now() - new Date(ev.timestamp).getTime() : 0;
    if (agent.phase === 'idle' || agent.phase === 'to_idle') {
      if (age < 30000) {
        agent.phase = 'to_work';
        planPathToWork(agent);
      } else {
        const wp = workPos(agent);
        agent.pos = { x: wp.x, y: wp.y };
        agent.phase = 'working';
      }
    }
  };
}

connect();
if (new URLSearchParams(window.location.search).get('demo') === 'true') runDemo();

async function sendPrompt() {
  const prompt = promptInput.value.trim();
  if (!prompt) return;
  promptSend.disabled = true; promptSend.textContent = '...';
  try {
    const r = await fetch('/prompt', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ prompt, projectDir: '', apiKey: localStorage.getItem('anthropic_api_key')||'' }),
    });
    const data = await r.json();
    if (data.ok) { promptInput.value=''; statusEl.textContent='Task deployed \u2014 watching for agent...'; }
    else statusEl.textContent = 'Error: '+(data.error||'unknown');
  } catch(e) { statusEl.textContent = 'Failed: '+e.message; }
  finally { promptSend.disabled=false; promptSend.textContent='DEPLOY'; }
}
promptSend.addEventListener('click', sendPrompt);
promptInput.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendPrompt();} });

// ─── UPDATE ───────────────────────────────────────────────────────────────────
function updateAgents() {
  const now = Date.now();
  for (const a of agents.values()) {
    if (a.slotIdx != null && a.buildProgress < 1)
      a.buildProgress = Math.min(1, a.buildProgress + 0.002);
    if (a.phase === 'working' && now - a.lastEvent > IDLE_TIMEOUT) {
      a.phase = 'to_idle'; a.action = 'idle';
      a.buildProgress = 0;
      planPathToLounge(a);
    }
    if (a.waypoints.length > 0) {
      const t = a.waypoints[0];
      const dx=t.x-a.pos.x, dy=t.y-a.pos.y;
      const d = Math.sqrt(dx*dx+dy*dy);
      if (d < 2) {
        a.pos.x=t.x; a.pos.y=t.y; a.waypoints.shift();
        if (!a.waypoints.length) {
          if (a.phase==='to_work') a.phase='working';
          if (a.phase==='to_idle') a.phase='idle';
        }
      } else {
        const sp = Math.min(1.7, d);
        a.pos.x+=dx/d*sp; a.pos.y+=dy/d*sp;
        a.facing = dx>0?'right':'left';
        a.walkTick++;
      }
    }
    if (a.bubbleLife > 0) a.bubbleLife--;
  }
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
let tick = 0;
function render() {
  ctx.clearRect(0,0,W,H);
  drawBackground();

  const drawables = [];

  // Social area furniture (drawn before idle workers so workers appear on top)
  drawables.push({ sortY: 428, draw: drawSocialArea });

  // Desks & group tables
  const slotMap = new Map();
  for (const a of agents.values()) {
    if (a.slotIdx != null) {
      if (!slotMap.has(a.slotIdx)) slotMap.set(a.slotIdx, []);
      slotMap.get(a.slotIdx).push(a);
    }
  }
  for (let i=0; i<BUILDING_SLOTS.length; i++) {
    const agHere = slotMap.get(i) || [];
    const s = BUILDING_SLOTS[i];
    const sortY = i < DESK_SLOTS ? s.y + 20 : s.y + 22;
    const ii = i;
    drawables.push({ sortY, draw: () => (ii < DESK_SLOTS ? drawDesk : drawGroupTable)(ii, agHere) });
  }

  // Workers
  for (const a of agents.values())
    drawables.push({ sortY: a.pos.y + 8, draw: () => drawWorker(a) });

  drawables.sort((a,b) => a.sortY - b.sortY);
  for (const d of drawables) d.draw();

  for (const a of agents.values()) { drawWorkerLabel(a); drawBubble(a); }
  if (agents.size === 0) drawEmptyState();
  drawTitleBar();

  updateAgents();
  tick++;
  requestAnimationFrame(render);
}
render();
</script>
