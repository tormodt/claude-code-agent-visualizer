<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Minions Workshop</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🍌</text></svg>">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0d12; display: flex; flex-direction: column; align-items: center; padding: 12px; font-family: 'Segoe UI', system-ui, sans-serif; }
  canvas { display: block; border: 2px solid #4a3800; border-radius: 4px; box-shadow: 0 8px 48px rgba(255,160,0,0.18), 0 2px 16px rgba(0,0,0,0.9); }
  #api-bar { width: 100%; display: flex; gap: 8px; margin-top: 8px; align-items: center; }
  #api-bar label { font-size: 10px; color: #7a6820; font-family: 'Courier New', monospace; white-space: nowrap; letter-spacing: 1px; }
  #api-key { flex: 1; background: #12100a; color: #c0a040; border: 1px solid #3a2800; border-radius: 3px; padding: 5px 10px; font-size: 12px; font-family: 'Courier New', monospace; outline: none; }
  #api-key:focus { border-color: #7a5000; }
  #api-key::placeholder { color: #2a2000; }
  #api-save { background: #181200; color: #a08030; border: 1px solid #3a2800; border-radius: 3px; padding: 5px 12px; font-size: 11px; cursor: pointer; font-family: 'Courier New', monospace; }
  #api-save:hover { background: #2a2000; color: #ffe040; }
  #prompt-bar { display: none; }
  #status { font-size: 10px; color: #5a4800; margin-top: 4px; font-family: 'Courier New', monospace; letter-spacing: 1px; align-self: flex-start; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="api-bar">
  <label>ANTHROPIC KEY</label>
  <input id="api-key" type="password" placeholder="sk-ant-..." autocomplete="off" spellcheck="false">
  <button id="api-save">SAVE</button>
</div>
<div id="prompt-bar">
  <input id="prompt-input" type="text" placeholder="Give Claude a task..." autocomplete="off" spellcheck="false">
  <button id="prompt-send">DEPLOY</button>
</div>
<div id="status">connecting...</div>
<script>
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const statusEl    = document.getElementById('status');
const promptInput = document.getElementById('prompt-input');
const promptSend  = document.getElementById('prompt-send');
const apiKeyInput = document.getElementById('api-key');
const apiSaveBtn  = document.getElementById('api-save');

const savedKey = localStorage.getItem('anthropic_api_key') || '';
function setKeyHidden(h) { document.getElementById('api-bar').style.display = h ? 'none' : 'flex'; if (!h) apiKeyInput.focus(); }
if (savedKey) { apiKeyInput.value = savedKey; setKeyHidden(true); }
apiSaveBtn.addEventListener('click', () => {
  const k = apiKeyInput.value.trim();
  if (k) { localStorage.setItem('anthropic_api_key', k); statusEl.textContent = 'API key saved'; setKeyHidden(true); }
  else   { localStorage.removeItem('anthropic_api_key'); statusEl.textContent = 'API key cleared'; }
});
apiKeyInput.addEventListener('keydown', e => { if (e.key === 'Enter') apiSaveBtn.click(); });
statusEl.style.cursor = 'pointer'; statusEl.title = 'Click to change API key';
statusEl.addEventListener('click', () => setKeyHidden(false));

const W = 900, H = 560;
const DPR = window.devicePixelRatio || 1;
canvas.width = W*DPR; canvas.height = H*DPR;
ctx.scale(DPR, DPR);

function resizeCanvas() {
  const pad = 24;
  const minW = Math.round(1920 * 0.40);
  const maxW = Math.round(1920 * 0.80);
  const dw = Math.max(minW, Math.min(maxW, window.innerWidth - pad));
  const dh = Math.round(dw * H / W);
  canvas.style.width  = dw + 'px';
  canvas.style.height = dh + 'px';
  const bar = document.getElementById('api-bar');
  if (bar) bar.style.maxWidth = dw + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ─── PALETTE ──────────────────────────────────────────────────────────────────
const LAB_FLOOR   = '#080c0a';  // very dark greenish
const POD_FLOOR   = '#060608';  // near black
const METAL_WALL  = '#1c1428';  // dark purple-tinted
const POD_COLOR   = '#c8900a';
const POD_GLOW    = '#ffe040';
const BENCH_TOP   = '#101820';  // dark panel
const BENCH_FACE  = '#0a1018';
const EQUIP_GREY  = '#3a4050';
const SKIN        = '#ffe040';  // minion yellow
const OVERALLS    = '#1565c0';  // minion blue
const GOGGLE_RIM  = '#78889a';
const GOGGLE_LENS = '#e8f8f0';
const OUTLINE     = '#181428';
const CHAIR_C     = '#1a2030';
const CHAIR_SEAT  = '#222838';
const CHEM_GREEN  = '#00ff88';  // vivid green chemicals

const ACTION_COLORS = {
  thinking:'#9966ff', reading:'#ffaa22', typing:'#22dd88',
  terminal:'#22ee44', browsing:'#3388ff', responding:'#cc66ff',
  receiving:'#22eecc', spawning:'#ff7722', searching:'#ffee22',
  tool:'#88ee22', idle:'#554466',
};
const ACTION_LABELS = {
  thinking:'THINKING', reading:'READING', typing:'WRITING',
  terminal:'TERMINAL', browsing:'BROWSING', responding:'SPEAKING',
  receiving:'RECEIVING', spawning:'SPAWNING', searching:'LOADING',
  tool:'TOOL', idle:'IDLE',
};
const AGENT_COLORS = ['#e83878','#28c87a','#2888e8','#e8b828','#9838e8','#e83828','#28c8d8','#e87828'];
const HAIR_COLS   = ['#1a1018','#2a1a08','#3a2010','#18100c','#382808','#160e0c'];

// ─── LAYOUT ───────────────────────────────────────────────────────────────────
const LOUNGE_W  = 220;
const DESK_SLOTS = 8;

// 8 individual desks + 2 group tables (collab tables)
const BUILDING_SLOTS = [
  { x: 308, y: 148 }, { x: 443, y: 148 }, { x: 578, y: 148 }, { x: 713, y: 148 },
  { x: 308, y: 295 }, { x: 443, y: 295 }, { x: 578, y: 295 }, { x: 713, y: 295 },
  { x: 385, y: 448 }, { x: 660, y: 448 },
];

const LOUNGE_GATE = { x: LOUNGE_W, y: 280 };

function workPos(agent) {
  const idx = agent.slotIdx;
  const s = BUILDING_SLOTS[idx];
  if (idx >= DESK_SLOTS) {
    const xOff = [-60, -20, 20, 60];
    const others = [...agents.values()].filter(a => a.slotIdx === idx);
    const posIdx = others.filter(a => a.colorIdx < agent.colorIdx).length;
    return { x: s.x + (xOff[posIdx % 4] || 0), y: s.y + 34 };
  }
  return { x: s.x, y: s.y + 32 };
}

// ─── AGENTS ───────────────────────────────────────────────────────────────────
const agents = new Map();
let colorIdx = 0;
const recentSpawners = new Map();
const IDLE_TIMEOUT = 50000;

function isSlotTaken(idx) {
  if (idx >= DESK_SLOTS) {
    let n = 0; for (const a of agents.values()) if (a.slotIdx === idx) n++;
    return n >= 4;
  }
  for (const a of agents.values()) if (a.slotIdx === idx) return true;
  return false;
}

function assignSlot(sessionId, projectDir) {
  const ex = agents.get(sessionId);
  if (ex?.slotIdx != null) return ex.slotIdx;
  const spawner = recentSpawners.get(projectDir);
  if (spawner && Date.now() - spawner.time < 90000 && spawner.sessionId !== sessionId) {
    for (let i = DESK_SLOTS; i < BUILDING_SLOTS.length; i++)
      if (!isSlotTaken(i)) return i;
  }
  for (let i = 0; i < DESK_SLOTS; i++)
    if (!isSlotTaken(i)) return i;
  return DESK_SLOTS;
}

function getOrCreate(sessionId, projectDir) {
  if (!agents.has(sessionId)) {
    const ci = colorIdx % AGENT_COLORS.length;
    agents.set(sessionId, {
      id: sessionId, name: projectDir,
      color: AGENT_COLORS[ci], colorIdx: colorIdx++,
      pos: { x: LOUNGE_GATE.x, y: LOUNGE_GATE.y },
      slotIdx: null, waypoints: [],
      phase: 'idle', action: 'idle',
      bubbleText: '', bubbleLife: 0,
      lastEvent: Date.now(),
      facing: 'right', walkTick: 0, buildProgress: 0,
    });
  }
  return agents.get(sessionId);
}

function planPathToWork(agent) {
  const dst = workPos(agent);
  const viaX = LOUNGE_W + 18 + (agent.colorIdx % 4) * 8;
  agent.waypoints = [{ x: viaX, y: dst.y }, dst];
}

function planPathToLounge(agent) {
  const lx = 105 + (agent.colorIdx % 5) * 18 - 36;
  const ly = 248 + (agent.colorIdx % 4) * 14 - 21;
  agent.waypoints = [
    { x: LOUNGE_W + 10, y: agent.pos.y },
    { x: LOUNGE_W - 8,  y: ly },
    { x: lx, y: ly },
  ];
}

// ─── DRAWING PRIMITIVES ───────────────────────────────────────────────────────
function rr(x, y, w, h, r) {
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}
function gBox(x,y,w,h,fill,r=3,sw=1.5) {
  ctx.fillStyle=fill; rr(x,y,w,h,r); ctx.fill();
  ctx.strokeStyle=OUTLINE; ctx.lineWidth=sw; rr(x,y,w,h,r); ctx.stroke();
}
function hexRgba(hex,a) {
  const n=parseInt(hex.slice(1),16);
  return `rgba(${n>>16},${(n>>8)&255},${n&255},${a})`;
}

// ─── HAZARD BARREL (replaces drawPlant) ──────────────────────────────────────
function drawHazardBarrel(cx, cy) {
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(cx+1, cy+6, 10, 4, 0, 0, Math.PI*2); ctx.fill();
  // Yellow barrel body
  ctx.fillStyle='#c8a000';
  rr(cx-8, cy-18, 16, 24, 3); ctx.fill();
  ctx.strokeStyle='#1a1a00'; ctx.lineWidth=1; rr(cx-8, cy-18, 16, 24, 3); ctx.stroke();
  // Metal rims top and bottom
  ctx.fillStyle='#9a7800';
  ctx.fillRect(cx-8, cy-18, 16, 3);
  ctx.fillRect(cx-8, cy+2, 16, 3);
  // Black hazard stripes
  for (let i=0; i<3; i++) {
    ctx.fillStyle='rgba(0,0,0,0.55)';
    ctx.fillRect(cx-8, cy-12+i*6, 16, 3);
  }
  // Hazard "!" symbol
  ctx.fillStyle='#000';
  ctx.font='bold 10px sans-serif'; ctx.textAlign='center';
  ctx.fillText('!', cx, cy-2);
}

// ─── BACKGROUND ───────────────────────────────────────────────────────────────
function drawBackground() {
  // ── Pod Bay (left) ──────────────────────────────────────────────────────────
  ctx.fillStyle = POD_FLOOR;
  ctx.fillRect(0, 0, LOUNGE_W, H);

  // Hex dot grid in pod bay
  ctx.fillStyle = 'rgba(255,220,0,0.05)';
  const hexSpacing = 18;
  for (let row = 0; row * hexSpacing < H + hexSpacing; row++) {
    const xOffset = (row % 2) * (hexSpacing / 2);
    for (let col = 0; col * hexSpacing < LOUNGE_W + hexSpacing; col++) {
      const hx = col * hexSpacing + xOffset;
      const hy = row * hexSpacing;
      ctx.beginPath(); ctx.arc(hx, hy, 1.2, 0, Math.PI*2); ctx.fill();
    }
  }

  // Hazard stripes at top of pod bay
  ctx.save();
  ctx.rect(0, 0, LOUNGE_W, 20); ctx.clip();
  for (let sx = -40; sx < LOUNGE_W + 20; sx += 18) {
    ctx.fillStyle = (Math.floor(sx/18) % 2 === 0) ? 'rgba(255,220,0,0.35)' : 'rgba(0,0,0,0.5)';
    ctx.save(); ctx.translate(sx, 0);
    ctx.beginPath();
    ctx.moveTo(0,0); ctx.lineTo(18,0); ctx.lineTo(18-6,20); ctx.lineTo(-6,20);
    ctx.closePath(); ctx.fill(); ctx.restore();
  }
  ctx.restore();

  // Hazard stripes at bottom of pod bay
  ctx.save();
  ctx.rect(0, H-20, LOUNGE_W, 20); ctx.clip();
  for (let sx = -40; sx < LOUNGE_W + 20; sx += 18) {
    ctx.fillStyle = (Math.floor(sx/18) % 2 === 0) ? 'rgba(255,220,0,0.35)' : 'rgba(0,0,0,0.5)';
    ctx.save(); ctx.translate(sx, H-20);
    ctx.beginPath();
    ctx.moveTo(0,0); ctx.lineTo(18,0); ctx.lineTo(18-6,20); ctx.lineTo(-6,20);
    ctx.closePath(); ctx.fill(); ctx.restore();
  }
  ctx.restore();

  // "GRU INDUSTRIES" neon sign
  // Outer glow rings (neon effect)
  [8,5,3,1].forEach((pad,i) => {
    ctx.strokeStyle=`rgba(180,0,255,${0.04+i*0.03})`; ctx.lineWidth=pad*2;
    rr(22-pad, 26-pad, 176+pad*2, 28+pad*2, 5+pad); ctx.stroke();
  });
  ctx.fillStyle='#08041a'; rr(22,26,176,28,5); ctx.fill();
  // Purple border
  ctx.strokeStyle='#aa00ff'; ctx.lineWidth=1.5; rr(22,26,176,28,5); ctx.stroke();
  ctx.strokeStyle='rgba(200,100,255,0.4)'; ctx.lineWidth=0.5; rr(24,28,172,24,4); ctx.stroke();
  // Title text with glow
  ctx.shadowColor='#ffd700'; ctx.shadowBlur=8;
  ctx.fillStyle='#ffd700'; ctx.font='bold 11px "Courier New"'; ctx.textAlign='center';
  ctx.fillText('GRU INDUSTRIES', 110, 43);
  ctx.shadowBlur=0;
  // Subtitle
  ctx.fillStyle='rgba(200,150,255,0.7)'; ctx.font='6px "Courier New"';
  ctx.fillText('☢  AUTHORIZED MINIONS ONLY  ☢', 110, 54);

  // Banana decoration at bottom-left
  ctx.save();
  ctx.translate(50, H - 58);
  ctx.rotate(-0.4);
  // Banana body (curved yellow shape)
  ctx.fillStyle = '#ffe040';
  ctx.beginPath();
  ctx.moveTo(-18, 0);
  ctx.bezierCurveTo(-18, -20, 18, -22, 20, -4);
  ctx.bezierCurveTo(22, 4, 10, 12, -14, 8);
  ctx.bezierCurveTo(-20, 6, -18, 0, -18, 0);
  ctx.fill();
  ctx.strokeStyle = '#c8a000'; ctx.lineWidth = 1; ctx.stroke();
  // Banana tips
  ctx.fillStyle = '#5a3800';
  ctx.beginPath(); ctx.ellipse(-18, 0, 3, 2, -0.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(20, -4, 3, 2, 0.3, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // ── Lab (right) ─────────────────────────────────────────────────────────────
  ctx.fillStyle = LAB_FLOOR;
  ctx.fillRect(LOUNGE_W, 0, W - LOUNGE_W, H);

  // Green ambient glow from chemical vats
  const labGlow = ctx.createRadialGradient(W-60, 80, 10, W-60, 80, 320);
  labGlow.addColorStop(0, 'rgba(0,200,80,0.10)');
  labGlow.addColorStop(1, 'rgba(0,200,80,0)');
  ctx.fillStyle = labGlow; ctx.fillRect(LOUNGE_W, 0, W - LOUNGE_W, H);

  // Diamond tile pattern on lab floor
  ctx.strokeStyle = 'rgba(0,180,80,0.05)'; ctx.lineWidth = 1;
  for (let x = LOUNGE_W; x < W; x += 44) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 44) { ctx.beginPath(); ctx.moveTo(LOUNGE_W,y); ctx.lineTo(W,y); ctx.stroke(); }

  // Hazard tape stripe along top of lab area
  ctx.save();
  ctx.rect(LOUNGE_W, 0, W - LOUNGE_W, 14); ctx.clip();
  for (let sx = LOUNGE_W - 20; sx < W + 20; sx += 18) {
    ctx.fillStyle = (Math.floor((sx - LOUNGE_W)/18) % 2 === 0) ? 'rgba(255,220,0,0.5)' : 'rgba(0,0,0,0.7)';
    ctx.save(); ctx.translate(sx, 0);
    ctx.beginPath();
    ctx.moveTo(0,0); ctx.lineTo(18,0); ctx.lineTo(18-4,14); ctx.lineTo(-4,14);
    ctx.closePath(); ctx.fill(); ctx.restore();
  }
  ctx.restore();

  // PIPES along top of lab (y=14-30)
  [[16,5,'rgba(0,200,100,0.5)','#0a1810'],[22,4,'rgba(100,50,255,0.4)','#0a0818'],[27,3,'rgba(255,60,60,0.3)','#180a0a']].forEach(([py,ph,sc,fc]) => {
    ctx.fillStyle=fc; ctx.fillRect(LOUNGE_W,py,W-LOUNGE_W,ph);
    ctx.strokeStyle=sc; ctx.lineWidth=0.8; ctx.strokeRect(LOUNGE_W,py,W-LOUNGE_W,ph);
    // pipe joints every 80px
    for (let jx=LOUNGE_W+40; jx<W-20; jx+=80) {
      ctx.fillStyle=sc; ctx.beginPath(); ctx.arc(jx,py+ph/2,ph*0.9,0,Math.PI*2); ctx.fill();
    }
  });

  // BIG BUBBLING VAT top-right corner
  const vx=W-72, vy=32, vw=58, vh=72;
  // Outer tank shadow
  ctx.fillStyle='rgba(0,0,0,0.5)'; rr(vx+3,vy+3,vw,vh,6); ctx.fill();
  // Tank body
  ctx.fillStyle='#060e08'; rr(vx,vy,vw,vh,6); ctx.fill();
  ctx.strokeStyle='rgba(0,255,100,0.6)'; ctx.lineWidth=2; rr(vx,vy,vw,vh,6); ctx.stroke();
  // Liquid inside
  ctx.fillStyle='rgba(0,180,60,0.18)'; rr(vx+3,vy+vh*0.35,vw-6,vh*0.62,4); ctx.fill();
  // Liquid surface shimmer
  const shimmer = Math.sin(tick*0.03)*3;
  ctx.fillStyle='rgba(0,255,100,0.25)'; rr(vx+3,vy+vh*0.35+shimmer,vw-6,6,2); ctx.fill();
  // Bubbles in vat
  [0,1,2,3].forEach(bi => {
    const bp=(tick*0.06+bi*1.4)%(Math.PI*2);
    ctx.globalAlpha=0.4+Math.sin(bp)*0.4;
    ctx.fillStyle='rgba(0,255,100,0.8)';
    ctx.beginPath(); ctx.arc(vx+10+bi*12, vy+vh*0.5+Math.sin(bp)*18, 2+bi*0.5, 0, Math.PI*2); ctx.fill();
  }); ctx.globalAlpha=1;
  // Outer glow
  ctx.fillStyle=`rgba(0,255,80,${0.04+Math.sin(tick*0.04)*0.02})`; rr(vx-6,vy-6,vw+12,vh+12,10); ctx.fill();
  // Pipes coming out of vat
  ctx.strokeStyle='rgba(0,200,80,0.5)'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(vx,vy+20); ctx.lineTo(LOUNGE_W,vy+20); ctx.stroke();
  // Label
  ctx.fillStyle='rgba(0,255,100,0.6)'; ctx.font='bold 7px "Courier New"'; ctx.textAlign='center';
  ctx.fillText('VAT-7', vx+vw/2, vy+vh+12);
  // Drip from vat
  ctx.fillStyle='rgba(0,255,100,0.4)';
  const dripY=(tick*0.5)%30;
  ctx.beginPath(); ctx.arc(vx+vw/2, vy+vh+4+dripY, 1.5-dripY*0.05, 0, Math.PI*2); ctx.fill();

  // ── Metal divider wall ──────────────────────────────────────────────────────
  const DOOR_Y = 250, DOOR_H = 70;

  // Above door
  ctx.fillStyle = METAL_WALL;
  ctx.fillRect(218, 0, 14, DOOR_Y);
  // Below door
  ctx.fillStyle = METAL_WALL;
  ctx.fillRect(218, DOOR_Y + DOOR_H, 14, H - (DOOR_Y + DOOR_H));

  // Rivets above door
  ctx.fillStyle = '#3a3a50';
  for (let ry = 20; ry < DOOR_Y - 8; ry += 20) {
    ctx.beginPath(); ctx.arc(222, ry, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(229, ry, 2, 0, Math.PI*2); ctx.fill();
  }
  // Rivets below door
  for (let ry = DOOR_Y + DOOR_H + 12; ry < H - 8; ry += 20) {
    ctx.beginPath(); ctx.arc(222, ry, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(229, ry, 2, 0, Math.PI*2); ctx.fill();
  }

  // Airlock door opening (black tunnel)
  ctx.fillStyle = '#050508';
  ctx.fillRect(218, DOOR_Y, 14, DOOR_H);

  // Yellow glow edges on door
  ctx.strokeStyle = 'rgba(255,200,0,0.6)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(218, DOOR_Y); ctx.lineTo(218, DOOR_Y + DOOR_H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(232, DOOR_Y); ctx.lineTo(232, DOOR_Y + DOOR_H); ctx.stroke();

  // "AUTHORIZED PERSONNEL ONLY" text above door
  ctx.save();
  ctx.translate(216, DOOR_Y - 2);
  ctx.rotate(-Math.PI/2);
  ctx.fillStyle = 'rgba(255,60,60,0.8)';
  ctx.font = '5px "Courier New"';
  ctx.textAlign = 'left';
  ctx.fillText('AUTHORIZED PERSONNEL ONLY', 0, 0);
  ctx.restore();

  // ── Hazard barrels ──────────────────────────────────────────────────────────
  drawHazardBarrel(LOUNGE_W + 18, 52);
  drawHazardBarrel(LOUNGE_W + 18, H - 42);
  drawHazardBarrel(8, 38);
  drawHazardBarrel(8, H - 38);

  // ── Section labels ──────────────────────────────────────────────────────────
  ctx.fillStyle = 'rgba(255,220,0,0.5)';
  ctx.font = '9px "Courier New"'; ctx.textAlign = 'center';
  ctx.fillText('POD BAY', LOUNGE_W / 2, H - 14);
  ctx.fillStyle = 'rgba(150,255,150,0.4)';
  ctx.fillText('LABORATORY', (LOUNGE_W + W) / 2, H - 14);
}

// ─── POD BAY (replaces drawCouch) ─────────────────────────────────────────────
function drawPodBay() {
  const CX = 118, CY = 260;

  // Shadow under pods
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(CX, CY + 30, 90, 10, 0, 0, Math.PI*2); ctx.fill();

  // Draw 2 sleeping pods
  const pods = [
    { x: 42, y: 200, w: 152, h: 44, label: 'POD-1' },
    { x: 42, y: 255, w: 152, h: 44, label: 'POD-2' },
  ];

  for (let pi = 0; pi < pods.length; pi++) {
    const p = pods[pi];
    const py_center = p.y + p.h / 2;

    // Pod shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.ellipse(p.x + p.w/2, p.y + p.h + 4, p.w/2 - 10, 5, 0, 0, Math.PI*2); ctx.fill();

    // Hazard stripes on top of pod
    ctx.save();
    rr(p.x, p.y, p.w, 5, 2); ctx.clip();
    for (let sx = p.x - 8; sx < p.x + p.w + 8; sx += 8) {
      ctx.fillStyle = (Math.floor((sx - p.x)/8) % 2 === 0) ? 'rgba(255,220,0,0.6)' : 'rgba(0,0,0,0.5)';
      ctx.fillRect(sx, p.y, 8, 5);
    }
    ctx.restore();

    // Pod main body
    ctx.fillStyle = POD_COLOR;
    rr(p.x, p.y, p.w, p.h, 8); ctx.fill();
    ctx.strokeStyle = 'rgba(255,200,0,0.4)'; ctx.lineWidth = 1.5;
    rr(p.x, p.y, p.w, p.h, 8); ctx.stroke();

    // Inner darker panel
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    rr(p.x + 6, p.y + 8, p.w - 48, p.h - 14, 4); ctx.fill();

    // Porthole window on right end
    const phx = p.x + p.w - 22, phy = py_center;
    // Rim
    ctx.fillStyle = GOGGLE_RIM;
    ctx.beginPath(); ctx.arc(phx, phy, 14, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#555'; ctx.lineWidth = 1; ctx.stroke();
    // Glass
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.beginPath(); ctx.arc(phx, phy, 11, 0, Math.PI*2); ctx.fill();
    // Inner glow
    ctx.fillStyle = 'rgba(200,255,150,0.15)';
    ctx.beginPath(); ctx.arc(phx, phy, 10, 0, Math.PI*2); ctx.fill();
    // Glowing dot (yellow pulse)
    const glowPulse = 0.5 + Math.sin(tick * 0.04 + pi) * 0.3;
    ctx.fillStyle = `rgba(255,230,0,${glowPulse})`;
    ctx.beginPath(); ctx.arc(phx, phy, 4, 0, Math.PI*2); ctx.fill();
    // Shine on porthole
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath(); ctx.arc(phx - 3, phy - 3, 3, 0, Math.PI*2); ctx.fill();

    // Pod label
    ctx.fillStyle = 'rgba(255,220,0,0.45)';
    ctx.font = '7px "Courier New"'; ctx.textAlign = 'left';
    ctx.fillText(p.label, p.x + 8, py_center + 3);
  }

  // Banana dispenser below pods
  const bdx = 118, bdy = 312;
  ctx.fillStyle = '#1a1800';
  rr(bdx - 28, bdy - 10, 56, 18, 3); ctx.fill();
  ctx.strokeStyle = '#c8a000'; ctx.lineWidth = 0.8; rr(bdx - 28, bdy - 10, 56, 18, 3); ctx.stroke();
  ctx.fillStyle = '#ffe040';
  ctx.font = '8px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('🍌 DISPENSER', bdx, bdy + 3);

  // Banana pile on floor — scattered bananas
  function drawBanana(bx, by, rot, scale) {
    ctx.save();
    ctx.translate(bx, by);
    ctx.rotate(rot);
    ctx.scale(scale, scale);
    // Banana body (curved yellow shape)
    ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 3; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-8, 2);
    ctx.quadraticCurveTo(0, -10, 8, 2);
    ctx.stroke();
    // Tip ends
    ctx.strokeStyle = '#c8a800'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(-8, 2); ctx.lineTo(-9, 4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(8, 2); ctx.lineTo(9, 4); ctx.stroke();
    ctx.restore();
  }
  // Scattered pile
  drawBanana(52, 350, 0.3, 0.9);
  drawBanana(68, 358, -0.5, 1.0);
  drawBanana(44, 360, 1.1, 0.85);
  drawBanana(80, 346, -1.2, 0.95);
  drawBanana(60, 365, 0.7, 0.8);
  drawBanana(36, 352, -0.2, 0.9);

  // "FREE BANANAS" label
  ctx.fillStyle = 'rgba(255,220,50,0.5)';
  ctx.font = '6px "Courier New"'; ctx.textAlign = 'center';
  ctx.fillText('FREE BANANAS', 60, 376);
}

// ─── GADGET STATION (replaces drawDesk) ───────────────────────────────────────
function drawLabBench(slotIdx, agentsHere) {
  const s = BUILDING_SLOTS[slotIdx];
  const cx = s.x, cy = s.y;
  const DW = 58, DH = 40;
  const agent = agentsHere[0];
  const aCol = agent ? (ACTION_COLORS[agent.action] || ACTION_COLORS.idle) : ACTION_COLORS.idle;
  const active = agent && agent.action !== 'idle' && agent.phase === 'working';
  const glowCol = active ? aCol : CHEM_GREEN;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.beginPath(); ctx.ellipse(cx+2,cy+DH/2+20,DW/2+6,8,0,0,Math.PI*2); ctx.fill();

  // Stool
  ctx.strokeStyle=active?'#2a3a50':'#161e28'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(cx,cy+DH/2+6); ctx.lineTo(cx,cy+DH/2+20); ctx.stroke();
  ctx.fillStyle=active?CHAIR_SEAT:hexRgba(CHAIR_SEAT,0.6);
  ctx.beginPath(); ctx.arc(cx,cy+DH/2+6,9,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=active?hexRgba(aCol,0.5):'rgba(50,70,90,0.4)'; ctx.lineWidth=1; ctx.stroke();

  // Station base (angled front panel with bright accent color)
  ctx.fillStyle=BENCH_FACE;
  rr(cx-DW/2,cy+DH/2-8,DW,11,2); ctx.fill();
  ctx.strokeStyle=active?hexRgba(aCol,0.7):'rgba(0,120,80,0.4)'; ctx.lineWidth=1.5;
  rr(cx-DW/2,cy+DH/2-8,DW,11,2); ctx.stroke();
  // BUTTONS on front panel (3 colored buttons)
  const btns = active ? [aCol,'#ff3322','#ffcc00'] : ['rgba(0,80,40,0.6)','rgba(60,10,5,0.6)','rgba(80,70,0,0.6)'];
  btns.forEach((bc,bi) => {
    ctx.fillStyle=bc; ctx.beginPath(); ctx.arc(cx-8+bi*8,cy+DH/2-2,3.5,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=0.5; ctx.stroke();
    if (active) { ctx.fillStyle=hexRgba(bc,0.3); ctx.beginPath(); ctx.arc(cx-8+bi*8,cy+DH/2-2,5.5,0,Math.PI*2); ctx.fill(); }
  });

  // Main control surface
  ctx.fillStyle=BENCH_TOP; rr(cx-DW/2,cy-DH/2,DW,DH,3); ctx.fill();
  ctx.strokeStyle=active?hexRgba(aCol,0.6):'rgba(0,100,60,0.35)'; ctx.lineWidth=1.5;
  rr(cx-DW/2,cy-DH/2,DW,DH,3); ctx.stroke();
  // Inset darker work area
  ctx.fillStyle='rgba(0,0,0,0.35)'; rr(cx-DW/2+4,cy-DH/2+4,DW-8,DH-8,2); ctx.fill();

  // SCREEN (left of panel)
  const mw=20,mh=15;
  ctx.fillStyle='#030608'; rr(cx-DW/2+4,cy-DH/2+4,mw,mh,2); ctx.fill();
  ctx.fillStyle=active?hexRgba(aCol,0.9):'rgba(0,50,20,0.5)';
  rr(cx-DW/2+5,cy-DH/2+5,mw-2,mh-2,1); ctx.fill();
  if (active) {
    // Scanlines
    ctx.strokeStyle='rgba(0,0,0,0.25)'; ctx.lineWidth=0.7;
    for (let sl=cy-DH/2+6; sl<cy-DH/2+4+mh; sl+=2.5) {
      ctx.beginPath(); ctx.moveTo(cx-DW/2+5,sl); ctx.lineTo(cx-DW/2+5+mw-2,sl); ctx.stroke();
    }
    ctx.fillStyle=hexRgba(aCol,0.18+Math.sin(tick*0.07)*0.08);
    ctx.beginPath(); ctx.ellipse(cx-DW/2+14,cy-DH/2+11,18,14,0,0,Math.PI*2); ctx.fill();
  } else {
    // Idle green blip
    ctx.fillStyle=`rgba(0,255,80,${0.3+Math.sin(tick*0.04)*0.2})`;
    ctx.beginPath(); ctx.arc(cx-DW/2+9,cy-DH/2+8,2,0,Math.PI*2); ctx.fill();
  }

  // ROTATING DIAL (right of panel)
  const dx=cx+DW/2-11, dy=cy-DH/2+11;
  ctx.fillStyle='#0a1008'; ctx.beginPath(); ctx.arc(dx,dy,8,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=active?hexRgba(aCol,0.8):'rgba(0,150,60,0.5)'; ctx.lineWidth=1.5; ctx.stroke();
  // Tick marks
  for (let t=0;t<8;t++) {
    const a=t*Math.PI/4; ctx.strokeStyle='rgba(100,200,100,0.4)'; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.moveTo(dx+Math.cos(a)*5.5,dy+Math.sin(a)*5.5); ctx.lineTo(dx+Math.cos(a)*7,dy+Math.sin(a)*7); ctx.stroke();
  }
  // Needle
  const needleA = active ? tick*0.05 : Math.PI*1.2;
  ctx.strokeStyle=active?aCol:'rgba(0,200,80,0.5)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(dx,dy); ctx.lineTo(dx+Math.cos(needleA)*6,dy+Math.sin(needleA)*6); ctx.stroke();

  // BEAKER (always visible, bottom-right area of panel)
  const bkx=cx+12, bky=cy+4;
  const beakerActive = active;
  ctx.strokeStyle=beakerActive?hexRgba(aCol,0.8):'rgba(0,150,60,0.4)'; ctx.lineWidth=1.2;
  ctx.beginPath();
  ctx.moveTo(bkx-6,bky-13); ctx.lineTo(bkx-7,bky-2);
  ctx.arc(bkx,bky+2,7,Math.PI+0.45,-0.45); ctx.lineTo(bkx+6,bky-13); ctx.stroke();
  // Liquid fill (always has some green liquid)
  const fillAlpha = beakerActive ? 0.65 : 0.25;
  ctx.fillStyle=beakerActive?hexRgba(aCol,fillAlpha):`rgba(0,180,60,${fillAlpha})`;
  ctx.beginPath(); ctx.arc(bkx,bky+2,7,0.5,Math.PI-0.5,true);
  ctx.lineTo(bkx-5,bky-5); ctx.lineTo(bkx+5,bky-5); ctx.closePath(); ctx.fill();
  if (beakerActive) {
    // Animated bubbles
    [0,1,2].forEach(bi => {
      const bp=(tick*0.1+bi*0.9)%(Math.PI*2);
      ctx.globalAlpha=0.6+Math.sin(bp)*0.35;
      ctx.fillStyle=hexRgba(aCol,1);
      ctx.beginPath(); ctx.arc(bkx-3+bi*3,bky-6+Math.sin(bp)*5,1.3,0,Math.PI*2); ctx.fill();
    }); ctx.globalAlpha=1;
    // Glow
    ctx.fillStyle=hexRgba(aCol,0.12+Math.sin(tick*0.05)*0.05);
    ctx.beginPath(); ctx.ellipse(bkx,bky,14,18,0,0,Math.PI*2); ctx.fill();
  } else {
    // Gentle idle glow
    ctx.fillStyle=`rgba(0,255,80,${0.04+Math.sin(tick*0.03)*0.02})`;
    ctx.beginPath(); ctx.ellipse(bkx,bky,12,14,0,0,Math.PI*2); ctx.fill();
  }
}

// ─── LAB TABLE (replaces drawGroupTable) ──────────────────────────────────────
function drawLabTable(slotIdx, agentsHere) {
  const s = BUILDING_SLOTS[slotIdx];
  const cx = s.x, cy = s.y;
  const TW = 168, TH = 58;
  const chairXs = [cx - 57, cx - 19, cx + 19, cx + 57];

  // Large shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath(); ctx.ellipse(cx + 3, cy + TH/2 + 18, TW/2 + 12, 12, 0, 0, Math.PI*2); ctx.fill();

  // Stool shadows (bottom row)
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  for (const lx of chairXs) {
    ctx.beginPath(); ctx.ellipse(lx, cy + TH/2 + 20, 10, 4, 0, 0, Math.PI*2); ctx.fill();
  }

  // Top row stools (empty, faint — no backs, just seats)
  for (let i = 0; i < 3; i++) {
    const tx = cx - 44 + i * 44;
    // Stool pole
    ctx.strokeStyle = hexRgba(EQUIP_GREY, 0.3); ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(tx, cy - TH/2 - 6); ctx.lineTo(tx, cy - TH/2 - 16); ctx.stroke();
    // Seat
    ctx.fillStyle = hexRgba(CHAIR_SEAT, 0.35);
    ctx.beginPath(); ctx.arc(tx, cy - TH/2 - 16, 8, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = OUTLINE; ctx.lineWidth = 0.6; ctx.stroke();
  }

  // Bottom row stools with poles
  for (let i = 0; i < 4; i++) {
    const lx = chairXs[i];
    const occ = i < agentsHere.length;
    // Stool pole
    ctx.strokeStyle = occ ? EQUIP_GREY : hexRgba(EQUIP_GREY, 0.4); ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(lx, cy + TH/2 + 4); ctx.lineTo(lx, cy + TH/2 + 18); ctx.stroke();
    // Seat
    ctx.fillStyle = occ ? CHAIR_SEAT : hexRgba(CHAIR_SEAT, 0.45);
    ctx.beginPath(); ctx.arc(lx, cy + TH/2 + 4, 9, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = OUTLINE; ctx.lineWidth = occ ? 1.1 : 0.6; ctx.stroke();
  }

  // Table top (rounded rectangle — lab metal)
  ctx.fillStyle = BENCH_FACE;
  rr(cx - TW/2, cy + TH/2 - 7, TW, 10, 1); ctx.fill();
  ctx.strokeStyle = OUTLINE; ctx.lineWidth = 1.1; rr(cx - TW/2, cy + TH/2 - 7, TW, 10, 1); ctx.stroke();

  ctx.fillStyle = BENCH_TOP;
  rr(cx - TW/2, cy - TH/2, TW, TH, 4); ctx.fill();
  ctx.strokeStyle = OUTLINE; ctx.lineWidth = 1.5; rr(cx - TW/2, cy - TH/2, TW, TH, 4); ctx.stroke();
  // Metal texture
  ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 1;
  for (let gx = cx - TW/2 + 10; gx < cx + TW/2 - 5; gx += 14) {
    ctx.beginPath(); ctx.moveTo(gx, cy - TH/2 + 3); ctx.lineTo(gx, cy + TH/2 - 3); ctx.stroke();
  }

  // Central large flask / bubbling chemical station
  const anyActive = agentsHere.some(a => a && a.action !== 'idle' && a.phase === 'working');
  const flaskACol = agentsHere[0] ? (ACTION_COLORS[agentsHere[0].action] || ACTION_COLORS.idle) : CHEM_GREEN;
  const flaskx = cx, flasky = cy - 4;

  // Flask body (Erlenmeyer style)
  ctx.strokeStyle = anyActive ? hexRgba(flaskACol, 0.7) : 'rgba(120,160,120,0.4)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(flaskx - 5, flasky - 16);
  ctx.lineTo(flaskx - 5, flasky - 8);
  ctx.lineTo(flaskx - 14, flasky + 8);
  ctx.arc(flaskx, flasky + 8, 14, Math.PI - 0.08, 0.08);
  ctx.lineTo(flaskx + 5, flasky - 8);
  ctx.lineTo(flaskx + 5, flasky - 16);
  ctx.stroke();
  // Flask neck top
  ctx.fillStyle = anyActive ? hexRgba(flaskACol, 0.15) : 'rgba(0,0,0,0.3)';
  ctx.fillRect(flaskx - 5, flasky - 16, 10, 3);
  // Liquid fill
  const fillCol = anyActive ? hexRgba(flaskACol, 0.45) : 'rgba(30,100,50,0.3)';
  ctx.fillStyle = fillCol;
  ctx.beginPath();
  ctx.arc(flaskx, flasky + 8, 14, Math.PI + 0.3, -0.3);
  ctx.lineTo(flaskx - 8, flasky + 2);
  ctx.closePath(); ctx.fill();

  if (anyActive) {
    // Animated bubbles
    [0,1,2,3].forEach(bi => {
      const bphase = (tick * 0.07 + bi * 1.2) % (Math.PI * 2);
      ctx.globalAlpha = 0.5 + Math.sin(bphase) * 0.4;
      ctx.fillStyle = hexRgba(flaskACol, 0.9);
      const bx = flaskx - 8 + bi * 6, by = flasky + 4 - Math.abs(Math.sin(bphase)) * 16;
      ctx.beginPath(); ctx.arc(bx, by, 1.5, 0, Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;
    // Flask glow
    ctx.fillStyle = hexRgba(flaskACol, 0.08 + Math.sin(tick*0.05)*0.04);
    ctx.beginPath(); ctx.ellipse(flaskx, flasky, 22, 28, 0, 0, Math.PI*2); ctx.fill();
  } else {
    ctx.globalAlpha = 1;
  }

  // Lab tablets at each seat (replacing laptops)
  for (let i = 0; i < 4; i++) {
    const lx = chairXs[i];
    const a = agentsHere[i];
    const aCol = a ? (ACTION_COLORS[a.action] || ACTION_COLORS.idle) : null;
    const on = a && a.action !== 'idle' && a.phase === 'working';
    ctx.fillStyle = a ? '#1a1a22' : hexRgba('#1a1a22', 0.4);
    rr(lx - 11, cy + 7, 22, 13, 2); ctx.fill();
    const tabBorderCol = on ? hexRgba(aCol, 0.7) : 'rgba(60,60,80,0.5)';
    ctx.strokeStyle = tabBorderCol; ctx.lineWidth = on ? 1.2 : 0.7;
    rr(lx - 11, cy + 7, 22, 13, 2); ctx.stroke();
    if (on) {
      ctx.fillStyle = hexRgba(aCol, 0.3);
      rr(lx - 10, cy + 8, 20, 11, 1); ctx.fill();
      ctx.fillStyle = hexRgba(aCol, 0.07 + Math.sin(tick*0.05+i)*0.04);
      ctx.beginPath(); ctx.ellipse(lx, cy + 13, 24, 18, 0, 0, Math.PI*2); ctx.fill();
    }
  }
}

// ─── MINION ────────────────────────────────────────────────────────────────────
function drawMinion(a) {
  const {pos:{x,y}, color, action, walkTick, phase, colorIdx:ci} = a;
  const walking = a.waypoints.length > 0;
  const bob = walking ? 0 : Math.sin(tick*0.045+ci)*0.9;
  const aCol = ACTION_COLORS[action]||ACTION_COLORS.idle;
  const isTall = ci % 3 === 0;
  const oneEye = ci % 3 === 1;
  const bodyH = isTall ? 36 : 28;
  const bodyW = isTall ? 12 : 15;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(x+1, y+bodyH*0.5+10, bodyW+4, 4, 0, 0, Math.PI*2); ctx.fill();

  // Walking leg animation
  const sw = walking ? Math.sin(walkTick*0.38)*6 : 0;

  // Legs (blue overalls color)
  ctx.fillStyle = OVERALLS;
  ctx.fillRect(x-6, y+bodyH*0.3+bob, 5, 11+sw);
  ctx.fillRect(x+1, y+bodyH*0.3+bob, 5, 11-sw);
  // Shoes (black rounded — bigger, more cartoony)
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.ellipse(x-4, y+bodyH*0.3+12+sw+bob, 7, 4, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+4, y+bodyH*0.3+12-sw+bob, 7, 4, 0, 0, Math.PI*2); ctx.fill();
  // Shoe shine
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath(); ctx.ellipse(x-5, y+bodyH*0.3+10+sw+bob, 3, 2, -0.4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+3, y+bodyH*0.3+10-sw+bob, 3, 2, -0.4, 0, Math.PI*2); ctx.fill();

  // Body (yellow ellipse — rounder, fatter)
  ctx.fillStyle = SKIN;
  ctx.beginPath();
  ctx.ellipse(x, y+bob, bodyW, bodyH, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(180,140,0,0.5)'; ctx.lineWidth = 1.2; ctx.stroke();

  // Overalls lower half
  ctx.fillStyle = OVERALLS;
  ctx.beginPath();
  ctx.ellipse(x, y+bodyH*0.35+bob, bodyW, bodyH*0.65, 0, 0, Math.PI*2);
  ctx.fill();
  // Overalls bib (bigger)
  ctx.fillStyle = hexRgba(OVERALLS, 0.9);
  rr(x-6, y-5+bob, 12, 10, 2); ctx.fill();
  ctx.strokeStyle = 'rgba(100,160,255,0.3)'; ctx.lineWidth = 0.5;
  rr(x-6, y-5+bob, 12, 10, 2); ctx.stroke();
  // "G" logo on bib
  ctx.fillStyle = 'rgba(255,255,180,0.85)';
  ctx.font = 'bold 7px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('G', x, y+2+bob);
  // Pocket on bib
  ctx.strokeStyle = 'rgba(100,160,255,0.25)'; ctx.lineWidth = 0.5;
  rr(x-4, y+2+bob, 8, 3, 1); ctx.stroke();
  // Overalls straps
  ctx.strokeStyle = hexRgba(OVERALLS, 0.8); ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(x-6, y-5+bob); ctx.lineTo(x-7, y-bodyH*0.7+bob); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+6, y-5+bob); ctx.lineTo(x+7, y-bodyH*0.7+bob); ctx.stroke();

  // Arms (chunkier)
  const armSwing = walking ? Math.sin(walkTick*0.38)*6 : 0;
  ctx.strokeStyle = SKIN; ctx.lineWidth = 5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x-bodyW, y-bodyH*0.15+bob); ctx.lineTo(x-bodyW-10, y+3+armSwing+bob); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+bodyW, y-bodyH*0.15+bob); ctx.lineTo(x+bodyW+10, y+3-armSwing+bob); ctx.stroke();
  ctx.lineCap = 'butt';
  // White gloves!
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.arc(x-bodyW-10, y+3+armSwing+bob, 5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+bodyW+10, y+3-armSwing+bob, 5, 0, Math.PI*2); ctx.fill();
  // Glove knuckle lines
  ctx.strokeStyle = 'rgba(180,180,180,0.6)'; ctx.lineWidth = 0.8;
  [-2,0,2].forEach(gox => {
    ctx.beginPath();
    ctx.moveTo(x-bodyW-10+gox, y+3+armSwing+bob-3);
    ctx.lineTo(x-bodyW-10+gox, y+3+armSwing+bob+3);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x+bodyW+10+gox, y+3-armSwing+bob-3);
    ctx.lineTo(x+bodyW+10+gox, y+3-armSwing+bob+3);
    ctx.stroke();
  });

  // Head (bigger, rounder)
  const headY = y - bodyH*0.75 + bob;
  const headR = isTall ? 11 : 13;
  ctx.fillStyle = SKIN;
  ctx.beginPath();
  ctx.ellipse(x, headY, headR, isTall ? headR*1.25 : headR, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(180,140,0,0.4)'; ctx.lineWidth = 1; ctx.stroke();

  // Hair — varies by ci
  const hairY = headY - (isTall ? headR*1.2 : headR);
  ctx.fillStyle = '#1a1010';
  if (ci % 4 === 0) {
    // Spiky (Kevin style) — bigger
    ctx.beginPath();
    ctx.moveTo(x-5,hairY+4); ctx.lineTo(x-9,hairY-5); ctx.lineTo(x-3,hairY-1);
    ctx.lineTo(x,hairY-9); ctx.lineTo(x+3,hairY-1); ctx.lineTo(x+9,hairY-5); ctx.lineTo(x+5,hairY+4);
    ctx.fill();
  } else if (ci % 4 === 1) {
    // Single side hair (Stuart) — swoopier
    ctx.strokeStyle = '#1a1010'; ctx.lineWidth = 3.5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(x+3, hairY+3); ctx.quadraticCurveTo(x+11, hairY-5, x+14, hairY-9); ctx.stroke();
    ctx.lineCap = 'butt';
  } else if (ci % 4 === 2) {
    // No hair (bald) — nothing
  } else {
    // Bowl cut (Bob)
    ctx.beginPath(); ctx.arc(x, hairY+4, headR, Math.PI, 0); ctx.fill();
  }

  // Goggle strap (thicker)
  ctx.fillStyle = GOGGLE_RIM;
  ctx.fillRect(x-headR-2, headY-3, headR*2+4, 5);

  // Goggle rim = agent color
  const goggleColor = AGENT_COLORS[ci % AGENT_COLORS.length];

  if (oneEye) {
    // ONE BIG EYE (Stuart) — bigger
    ctx.fillStyle = goggleColor;
    ctx.beginPath(); ctx.arc(x, headY, 8, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#555'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.fillStyle = GOGGLE_LENS;
    ctx.beginPath(); ctx.arc(x, headY, 6, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(x+0.5, headY+0.5, 3.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.beginPath(); ctx.arc(x-2, headY-2, 1.5, 0, Math.PI*2); ctx.fill();
  } else {
    // TWO EYES — bigger
    [-5.5, 5.5].forEach((ox) => {
      ctx.fillStyle = goggleColor;
      ctx.beginPath(); ctx.arc(x+ox, headY, 5.5, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#555'; ctx.lineWidth = 1.2; ctx.stroke();
      ctx.fillStyle = GOGGLE_LENS;
      ctx.beginPath(); ctx.arc(x+ox, headY, 3.8, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#111';
      ctx.beginPath(); ctx.arc(x+ox+0.4, headY+0.4, 2.2, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.beginPath(); ctx.arc(x+ox-1, headY-1, 1, 0, Math.PI*2); ctx.fill();
    });
    // Bridge between goggles
    ctx.fillStyle = GOGGLE_RIM;
    ctx.fillRect(x-1, headY-2, 2, 4);
  }

  // Smile with teeth!
  ctx.strokeStyle = 'rgba(100,50,0,0.9)'; ctx.lineWidth = 1.8;
  ctx.beginPath();
  const smR = headR * 0.5, smY = headY + headR*0.45;
  ctx.arc(x, smY, smR, 0.3, Math.PI-0.3);
  ctx.stroke();
  // White teeth (2 big rectangles between smile arc endpoints)
  const t1x = x - smR * Math.cos(0.3), t1y = smY + smR * Math.sin(0.3);
  const t2x = x + smR * Math.cos(0.3), t2y = t1y;
  const smileWidth = t2x - t1x;
  ctx.fillStyle = 'white';
  ctx.fillRect(t1x + smileWidth*0.1, t1y - 3, smileWidth*0.35, 4);
  ctx.fillRect(t1x + smileWidth*0.55, t1y - 3, smileWidth*0.35, 4);
  // Tooth gap line
  ctx.strokeStyle = 'rgba(100,50,0,0.5)'; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(x, t1y-3); ctx.lineTo(x, t1y+1); ctx.stroke();

  // Action glow halo
  if (action !== 'idle' && phase === 'working') {
    ctx.fillStyle = hexRgba(aCol, 0.07+Math.sin(tick*0.06)*0.03);
    ctx.beginPath(); ctx.ellipse(x, y, 26, 32, 0, 0, Math.PI*2); ctx.fill();
  }

  // Raised arm + tool when working
  if (action !== 'idle' && action !== 'thinking' && phase === 'working') {
    ctx.strokeStyle = SKIN; ctx.lineWidth = 5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(x+bodyW, y-bodyH*0.15+bob); ctx.lineTo(x+bodyW+12, y-bodyH*0.5+bob); ctx.stroke();
    ctx.lineCap = 'butt';
    // White glove on raised hand too
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(x+bodyW+12, y-bodyH*0.5+bob, 5, 0, Math.PI*2); ctx.fill();
    ctx.save(); ctx.translate(0, bob); drawLabTool(x, y, action, aCol, bodyH); ctx.restore();
  }

  // Thinking animation
  if (action === 'thinking' && phase === 'working') {
    const ph = (tick*0.07)%(Math.PI*2);
    [0,1,2].forEach(i => {
      ctx.globalAlpha = 0.4+Math.sin(ph+i*1.0)*0.35;
      ctx.fillStyle = '#FFD700';
      ctx.beginPath(); ctx.arc(x-5+i*5, headY-headR-8-Math.sin(ph+i)*4, 3, 0, Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;
  }
}

function drawLabTool(x, y, action, aCol, bodyH) {
  const tx = x + 14, ty = y - bodyH*0.5 - 10;
  if (action === 'reading') {
    // Clipboard
    ctx.fillStyle = '#888'; rr(tx-2,ty-8,14,12,1); ctx.fill();
    ctx.fillStyle = 'rgba(240,240,200,0.9)'; rr(tx-1,ty-6,12,10,1); ctx.fill();
    ctx.strokeStyle = '#aaa'; ctx.lineWidth = 0.6;
    for (let li=0; li<3; li++) { ctx.beginPath(); ctx.moveTo(tx+1,ty-4+li*3); ctx.lineTo(tx+9,ty-4+li*3); ctx.stroke(); }
  } else if (action === 'typing') {
    // Mini keyboard
    ctx.fillStyle = '#1e1c2e'; rr(tx-2,ty-6,16,10,1); ctx.fill();
    ctx.fillStyle = hexRgba(aCol,0.75); rr(tx-1,ty-5,14,8,1); ctx.fill();
  } else if (action === 'terminal') {
    // Green screen terminal
    ctx.fillStyle = '#0a1008'; rr(tx-2,ty-8,14,12,1); ctx.fill();
    ctx.fillStyle = '#22ee44'; ctx.font = '5px "Courier New"'; ctx.textAlign = 'left'; ctx.fillText('>_',tx,ty+2);
  } else if (action === 'browsing') {
    // Phone
    ctx.fillStyle = '#2a2840'; rr(tx+1,ty-8,9,15,2); ctx.fill();
    ctx.fillStyle = hexRgba(aCol,0.65); rr(tx+2,ty-6,7,10,1); ctx.fill();
  } else if (action === 'spawning') {
    // Test tube with bubbling liquid
    ctx.strokeStyle = 'rgba(200,220,200,0.8)'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(tx, ty-10); ctx.lineTo(tx, ty+2);
    ctx.arc(tx, ty+2, 3, 0, Math.PI);
    ctx.stroke();
    ctx.fillStyle = hexRgba(aCol,0.7);
    ctx.beginPath(); ctx.arc(tx, ty+2, 3, 0, Math.PI); ctx.fill();
    ctx.fillStyle = hexRgba(aCol,0.9);
    ctx.beginPath(); ctx.arc(tx, ty-2+Math.sin(tick*0.2)*2, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(tx+1, ty-5+Math.sin(tick*0.15+1)*2, 1, 0, Math.PI*2); ctx.fill();
  } else if (action === 'searching') {
    // Magnifying glass
    ctx.strokeStyle = '#ffee22'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(tx+4,ty-6,5,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(tx+8,ty-2); ctx.lineTo(tx+11,ty+1); ctx.stroke();
  } else {
    ctx.fillStyle = aCol; ctx.globalAlpha = 0.85;
    ctx.beginPath(); ctx.arc(tx+5,ty-4,4,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ─── OVERLAYS ─────────────────────────────────────────────────────────────────
function drawWorkerLabel(a) {
  if (a.phase === 'idle') return;
  const {pos:{x,y}, name, action} = a;
  const aCol = ACTION_COLORS[action]||ACTION_COLORS.idle;
  const lbl = action !== 'idle' ? (ACTION_LABELS[action]||action.toUpperCase()).slice(0,9) : name.slice(0,10);
  ctx.font = 'bold 9px "Segoe UI",system-ui';
  const tw=ctx.measureText(lbl).width, bw=tw+10, bh=14;
  ctx.fillStyle = 'rgba(14,12,10,0.90)'; rr(x-bw/2,y-30,bw,bh,5); ctx.fill();
  ctx.strokeStyle = hexRgba(aCol,0.6); ctx.lineWidth = 1; rr(x-bw/2,y-30,bw,bh,5); ctx.stroke();
  ctx.fillStyle = '#ffe040'; ctx.textAlign = 'center'; ctx.fillText(lbl,x,y-19);
}

function drawBubble(a) {
  if (a.bubbleLife <= 0) return;
  const {pos:{x,y}, bubbleText, bubbleLife, color} = a;
  const alpha = Math.min(1,bubbleLife/30);
  const text = bubbleText.length>32 ? bubbleText.slice(0,32)+'…' : bubbleText;
  ctx.font = '11px "Segoe UI",system-ui';
  const tw=ctx.measureText(text).width, bw=tw+16, bh=22;
  const bx=Math.max(10,Math.min(W-bw-10,x-bw/2)), by=y-56;
  ctx.save(); ctx.globalAlpha=alpha;
  gBox(bx,by,bw,bh,'#1a1400',5,1.5);
  ctx.strokeStyle=hexRgba(color,0.6); ctx.lineWidth=1.5; rr(bx,by,bw,bh,5); ctx.stroke();
  const tx=Math.max(bx+8,Math.min(bx+bw-8,x));
  ctx.fillStyle='#1a1400';
  ctx.beginPath(); ctx.moveTo(tx-4,by+bh); ctx.lineTo(tx+4,by+bh); ctx.lineTo(tx,by+bh+5); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#ffe8a0'; ctx.textAlign='left';
  ctx.beginPath(); rr(bx+1,by+1,bw-2,bh-2,4); ctx.clip(); ctx.fillText(text,bx+8,by+15);
  ctx.restore();
}

function drawTitleBar() {
  ctx.fillStyle = 'rgba(10,8,2,0.96)'; ctx.fillRect(0,0,W,18);
  // Yellow left bracket indicator
  ctx.fillStyle = '#ffe040'; ctx.fillRect(2, 3, 3, 12);
  ctx.font = '10px "Courier New"'; ctx.fillStyle = 'rgba(255,220,64,0.9)'; ctx.textAlign = 'left';
  ctx.fillText('[ ] MINIONS WORKSHOP  //  CLAUDE CODE VISUALIZER', 10, 13);
  ctx.fillStyle = 'rgba(255,200,40,0.6)'; ctx.textAlign = 'right';
  const working = [...agents.values()].filter(a=>a.phase==='working').length;
  ctx.fillText(`${agents.size} minion${agents.size!==1?'s':''} · ${working} working`, W-10, 13);
}

function drawEmptyState() {
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,220,64,0.45)'; ctx.font = '16px "Segoe UI",system-ui';
  ctx.fillText('No minions in the lab', W/2, H/2 - 10);
  ctx.fillStyle = 'rgba(255,200,40,0.3)'; ctx.font = '12px "Segoe UI",system-ui';
  ctx.fillText('Start Claude Code to summon minions', W/2, H/2 + 14);
  // Decorative banana
  ctx.font = '28px sans-serif'; ctx.fillStyle = 'rgba(255,220,64,0.2)';
  ctx.fillText('🍌', W/2, H/2 + 50);
}

// ─── SSE ──────────────────────────────────────────────────────────────────────
function connect() {
  const es = new EventSource('/events');
  es.onopen  = () => { statusEl.textContent = 'connected — watching for minions'; };
  es.onerror = () => { statusEl.textContent = 'reconnecting...'; es.close(); setTimeout(connect, 2000); };
  es.onmessage = e => {
    const ev    = JSON.parse(e.data);
    const agent = getOrCreate(ev.sessionId, ev.projectDir);
    if (ev.action === 'spawning')
      recentSpawners.set(ev.projectDir, { sessionId: ev.sessionId, time: Date.now() });
    agent.action    = ev.action;
    agent.lastEvent = ev.timestamp ? new Date(ev.timestamp).getTime() : Date.now();
    agent.bubbleText = ev.detail;
    agent.bubbleLife = 240;
    if (agent.slotIdx == null)
      agent.slotIdx = assignSlot(ev.sessionId, ev.projectDir);
    const age = ev.timestamp ? Date.now() - new Date(ev.timestamp).getTime() : 0;
    if (agent.phase === 'idle' || agent.phase === 'to_idle') {
      if (age < 30000) {
        agent.phase = 'to_work';
        planPathToWork(agent);
      } else {
        const wp = workPos(agent);
        agent.pos = { x: wp.x, y: wp.y };
        agent.phase = 'working';
      }
    }
  };
}

connect();

async function sendPrompt() {
  const prompt = promptInput.value.trim();
  if (!prompt) return;
  promptSend.disabled = true; promptSend.textContent = '...';
  try {
    const r = await fetch('/prompt', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ prompt, projectDir: '', apiKey: localStorage.getItem('anthropic_api_key')||'' }),
    });
    const data = await r.json();
    if (data.ok) { promptInput.value=''; statusEl.textContent='Task deployed — watching for agent...'; }
    else statusEl.textContent = 'Error: '+(data.error||'unknown');
  } catch(e) { statusEl.textContent = 'Failed: '+e.message; }
  finally { promptSend.disabled=false; promptSend.textContent='DEPLOY'; }
}
promptSend.addEventListener('click', sendPrompt);
promptInput.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendPrompt();} });

// ─── UPDATE ───────────────────────────────────────────────────────────────────
function updateAgents() {
  const now = Date.now();
  for (const a of agents.values()) {
    if (a.slotIdx != null && a.buildProgress < 1)
      a.buildProgress = Math.min(1, a.buildProgress + 0.002);
    if (a.phase === 'working' && now - a.lastEvent > IDLE_TIMEOUT) {
      a.phase = 'to_idle'; a.action = 'idle';
      a.buildProgress = 0;
      planPathToLounge(a);
    }
    if (a.waypoints.length > 0) {
      const t = a.waypoints[0];
      const dx=t.x-a.pos.x, dy=t.y-a.pos.y;
      const d = Math.sqrt(dx*dx+dy*dy);
      if (d < 2) {
        a.pos.x=t.x; a.pos.y=t.y; a.waypoints.shift();
        if (!a.waypoints.length) {
          if (a.phase==='to_work') a.phase='working';
          if (a.phase==='to_idle') a.phase='idle';
        }
      } else {
        const sp = Math.min(1.7, d);
        a.pos.x+=dx/d*sp; a.pos.y+=dy/d*sp;
        a.facing = dx>0?'right':'left';
        a.walkTick++;
      }
    }
    if (a.bubbleLife > 0) a.bubbleLife--;
  }
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
let tick = 0;
function render() {
  ctx.clearRect(0,0,W,H);
  drawBackground();

  const drawables = [];

  // Pod bay (drawn before idle minions so minions appear on top)
  drawables.push({ sortY: 244, draw: drawPodBay });

  // Lab benches & lab tables
  const slotMap = new Map();
  for (const a of agents.values()) {
    if (a.slotIdx != null) {
      if (!slotMap.has(a.slotIdx)) slotMap.set(a.slotIdx, []);
      slotMap.get(a.slotIdx).push(a);
    }
  }
  for (let i=0; i<BUILDING_SLOTS.length; i++) {
    const agHere = slotMap.get(i) || [];
    const s = BUILDING_SLOTS[i];
    const sortY = i < DESK_SLOTS ? s.y + 20 : s.y + 22;
    const ii = i;
    drawables.push({ sortY, draw: () => (ii < DESK_SLOTS ? drawLabBench : drawLabTable)(ii, agHere) });
  }

  // Minions
  for (const a of agents.values())
    drawables.push({ sortY: a.pos.y + 8, draw: () => drawMinion(a) });

  drawables.sort((a,b) => a.sortY - b.sortY);
  for (const d of drawables) d.draw();

  for (const a of agents.values()) { drawWorkerLabel(a); drawBubble(a); }
  if (agents.size === 0) drawEmptyState();
  drawTitleBar();

  updateAgents();
  tick++;
  requestAnimationFrame(render);
}
render();
</script>
